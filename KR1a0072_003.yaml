body:
  text: 易纂言外翼卷三元吳澄撰象例第七中人蒙初利用刑人履彖三嘻人睽三其人天且劓損三三人一人艮彖不見其人豐上闃其無人卦位三四為人二五亦為人大人乾二五訟彖蹇彖上萃彖巽彖利見大人凡七升彖用見大人否二大人否亨五大人吉師彖困彖貞大人吉革五大人虎變大人者皆陽居二五陽為大二五為人位乾五訟彖蹇彖上萃彖巽彖否二五革五皆謂九五在上之大人也乾二升彖困彖謂九二在下之大人也師彖貞大人吉今本作丈人崔憬李鼎祚皆云子夏傳作大人與困彖同幽人履二幽人貞吉歸妹二利幽人之貞幽人者隱晦不求顯見之人凡在天上而不可見曰冥冥豫冥升是也在地下而不可見曰幽困初幽谷是也履歸妹九二皆有剛中之德二之位當六畫卦之地又當三畫卦之人故曰幽人君子乾三君子終日乾乾坤彖君子有攸往屯三君子幾不如舍小畜上君子征凶否彖不利君子貞謙彖三君子有終初君子用涉大川觀初君子吝五上君子無咎剝上君子得輿遁四君子吉大壯三君子用罔解五君子惟有解吉夬三君子夬夬革上君子豹變未濟五君子之光凡君子者皆謂陽畫然有指本爻之陽畫而言者乾三小畜上謙三觀五上剝上遁四大壯三夬三是也有指本卦之陽畫而言者否彖是指上卦三陽謙彖是指主爻九三解五未濟五是指應爻九二有本卦雖有陽畫而本爻所言非有所指只是泛言者屯卦雖有二陽畫而六三所謂君子非指初九九五也觀卦雖有二陽畫而初六所謂君子非指九五上九也革卦雖有四陽畫而上六所謂君子只是對小人立文亦以其變為陽與謙初同也坤卦純隂無陽畫彖辭所謂君子只是泛言亦因卦之所不足者而言也天子大有三公用亨于天子王坤二訟三或從王事師二王三錫命比五王用三驅離上王用出征隨上王用亨于岐山升四王用亨于西山益二王用亨于帝萃彖渙彖王假有廟家人五王假有家豐彖王假之觀四利用賔于王夬彖揚于王庭井三王明渙五王居大君師上大君有命履三武人為于大君臨五大君之宜天子王大君皆謂君天下者其位則卦之第五畫也訟比履隨觀家人夬益萃井渙皆九五以剛中正居尊位堯舜禹湯文王武王是也坤師大有臨離升豐皆五六以柔中居尊位夏啓商中宗周成王是也君復上以其國君小過二不及其君公大有三公用亨于天子解上公用射隼益三四中行告公鼎四覆公餗小過五公弋侯屯彖初利建侯豫彖利建侯行師晋彖康侯用錫馬蕃庶君公侯皆謂有國者凡卦之六畫三居下卦之上四居上卦之下故三四為諸侯國君之位大有之公三也鼎之公四也解上小過五所謂公亦四也小過二所謂君亦三也坤為國土震以一陽宅坤土之內故震象國君屯豫言建侯皆有坤有震益兩言公復一言國君亦有坤有震晉有坤無震者晉言有土之諸侯坤有安靜之象故曰康侯也王侯蠱上不事王侯王五也侯三也臣蹇二王臣蹇蹇損上得臣無家小過二遇其臣柔者臣道也二居下卦之中臣位也蹇六二小過六二皆柔中在下損上所謂臣指六三而言亦以柔居下者也宗同人二同人于宗睽五厥宗噬膚宗字從門從示廟中之室神示所居離之中畫虛處象廟之室凡嫡長子主宗廟之祭者謂之宗子宗子統衆兄弟同人之二睽之五皆為卦之主猶宗子之統衆兄弟也故謂之宗家人家人三家人嗃嗃家人謂家之長彖傳曰家人有嚴君焉父母之謂也詩云之子于歸宜其家人家人指舅姑而言或以為泛指一家之人非也離為家九三離之上畫陽剛在一家之上而治外者家之長也父母蠱初三五幹父之蠱四裕父之蠱蠱二幹母之蠱居一卦極尊之位者上與五也上陽畫為父五隂畫為母考履上考祥其旋蠱初有子考無咎蠱初所謂考即上畫之陽也生稱父死稱考履上畫之陽當乾之終故曰考祥祖妣小過二過其祖遇其妣小過之三以陽畫處二之上父也四亦陽畫又處三之上二視之猶祖也五隂畫居尊位猶祖妣也二之位與五應越四而與五遇故曰過其祖遇其妣王母晋二受兹介福于其王母六五隂居至尊之位以家而言王母也爾雅曰父之妣為王母九四以陽在二之上父也六三以隂為四之配母也六五隂也又在父母之上故曰王母二之位與五應猶祭而感格于五五降介福于二而二受之也夫士蒙三見金夫隨二失丈夫三係丈夫恆五夫子凶睽四遇元夫比彖後夫凶大過二老夫得其女妻五老婦得其士夫歸妹上士刲羊蒙三之金夫九二也隨二之丈夫九五也隨三之丈夫九四也恆六五隂柔非夫之道故凶元夫後夫皆因婦人之再嫁而有是名元夫者初所嫁之夫也後夫者後所嫁之夫也睽之元夫謂初九也比之諸隂所從惟一夫而已無二夫也故占者若是後夫則凶老夫士夫以年之老少言二變為柔為年少之妻故視五為老夫五變為柔為年老之婦故視二為士夫士謂男子之未娶者歸妹上所謂士指初九也婦妻蒙二納婦吉小畜上婦貞厲漸三婦孕不育凶五婦三嵗不孕既濟二婦喪其茀恆五婦人吉大過五老婦大過二女妻困三不見其妻䝉二之婦六五也小畜之婦六四也漸三之婦六四也漸五之婦六二也既濟六二為九五之婦恆五夫也然柔中乃婦之德故婦人則吉老婦女妻見前困三居陽位以上六為妻在外而不在宫又不相應故曰不見夫妻小畜三夫妻反目九三夫也六四妻也婦子家人三婦子嘻嘻婦六二也子初九也子蒙二子克家蠱初有子考無咎鼎初得妾以其子師五長子帥師弟子輿尸隨二係小子三失小子漸初小子厲蠱之初六女也九三互震之初畫為子鼎初六妾也九四乃其子師二三四互震長子也初二三坎體為中男弟子也弟子者長子之弟隨二隨三之小子皆謂初九漸初艮少男之下畫故曰小子女屯二女子貞不字蒙三勿用取女咸彖取女吉家人彖利女貞姤彖女壯勿用取女漸彖女歸吉歸妹上女承筐咸上六少女也家人六二中女也漸六四長女也柔而正占之吉而利也宜哉屯六二女之無初者歸妹上六女之無終者非女德之有疵乃時命之不齊也蒙六三以利之所疚而愆義姤初六以隂之方長而消陽處皆非正女之不可取者也妹泰五帝乙歸妹以祉歸妹初歸妹以娣三歸妹以須反歸以娣四歸妹愆期五帝乙歸妹泰卦互得歸妹卦帝乙商王紂之父蓋嘗有嫁妹之事緯書因此嫌帝乙非商之令王遂以帝乙為湯始制為嫁妹之禮又載其戒命之辭曰毋以天子之富而驕諸侯隂之從陽女之順夫天下之義也往事爾夫必以禮義其辭意雖善疑後人傅㑹為之也經言帝乙歸妹則是以兄嫁妹非以父嫁女明矣而說易者以震兊為夫婦而不以為兄妹失之矣卦義以外卦震長男為兄內卦兊少女為妹兄為主而歸其妹於夫家也爻義以震下畫之陽為兄中畫之隂為妹六三兊上畫為娣為須娣者女君之女弟也須與􅎐同女之賤者又在娣之下也歸妹自泰變六三即泰之六四在六五之下女弟承女君也變為歸妹則四來居三是女君未行而先行歸于夫家不隨女君則非娣矣故降而稱須若及于四待女君同行則為妹歸而以其娣也宫人剝五以宫人寵剝卦五隂畫六五居尊位象后下四隂象宫人宫人者三夫人九嬪二十七世婦八十一御妻之屬也以者后以之也妾鼎初得妾以其子初隂在下而賤者妾也四陽在上而貴者其子也臣妾遁三畜臣妾吉初六居陽位臣也六二居隂位妾也童僕旅二得童僕貞三喪其童僕車上之御曰僕以其立當車轐也故凡親近服役之人皆假借僕之名童者年幼之稱童僕僕之年幼者也初六下賤居陽位艮少男之下畫也故為童僕隨隨三隨有求得四隨有獲咸三執其隨艮二不拯其隨隨猶從也隨從之人也隨六三九四之隨也咸艮六二九三之隨也前此解者只以隨字作虛字解誤矣咸象傳所謂隨人猶曰從人也婚媾屯二賁四睽上匪冦婚媾屯四求婚媾震上婚媾有言二姓締男女之好謂之婚媾取婦者以初昏成禮故曰婚媾者交冓之義後人各加女字于左畔屯六二六四賁六四睽上九皆以正應之畫為婚媾震上六雖無應然與六三同位故亦曰婚媾同人同人彖同人于野初同人于門二同人于宗五同人先號咷而後笑上同人于郊同人者同心之人也非曰同於人也六二為九五所同之人九五為六二所同之人也二五皆居人位故曰同人朋坤彖得朋喪朋泰二朋亡豫四朋盍簮復彖朋來咸四朋從蹇五朋來解四朋至友損三一人行則得其友鳳飛而羣鳥從之曰朋凡曰朋者從我者也兩手相助曰友凡曰友者助我者也易之言朋者七卦言友者一卦坤彖之朋謂衆隂也此隂以隂為朋也泰二之朋謂初陽也復彖之朋謂臨泰大壯夬之陽也咸四之朋謂九五也解四之朋謂九二也此陽以陽為朋也惟豫九四之朋盍簮謂五隂為朋蓋九四以陽而居隂隂性多疑故戒以勿疑則雖居隂而隂之同類從之也損六三之得其友謂上九此隂以陽為友也交隨初出門交有功睽四交孚大有初無交朋者隂陽同類相從亦或隂從陽也友者勝已為助陽助隂也交者彼已皆陽同德相交也隨初九與九四為交睽九四與初九為交大有初九亦以九四為交九四挾其貴盛而相與故無交尚小畜上尚得載泰二得尚于中行坎彖行有尚豐初節五往有尚尚謂在已之上而相配合者故人臣取天子之女謂之尚小畜六四在九三之上泰六五在九二之上坎九五在六四之上豐六二在初九之上節九五在六四之上所謂尚也坎節以陽為尚猶下女配上男也小畜泰豐以隂為尚猶下男配上女也彚泰初否初以其彚疇否四疇離祉彚疇皆類也如蝟之毛刺同時奮興者曰彚如田之疆畎相並作伴者曰疇泰初之彚乾三陽也否初之彚坤三隂也否九四之疇乾三陽也仇鼎二我仇有疾仇匹也詩曰君子好仇鼎九二六五正應也故曰仇敵中孚四得敵與已同等者曰敵中孚六四與六三皆隂也故曰敵鄰小畜五富以其鄰泰四謙五不富以其鄰震上于其鄰既濟五東鄰西鄰鄰謂相比近者也小畜九五以六四為鄰泰六四以六五為鄰謙六五以六四為鄰震九四以六三為鄰既濟東鄰六二也西鄰九五也三為東二與三鄰故曰東鄰四為西五與四鄰故曰西鄰主坤彖後得主明夷初主人有言睽二遇主于巷豐初遇其配主四遇其夷主凡卦之六畫有一畫為主爻坤之主爻在上六故占者後乃得主蓋主在卦之終也明夷之主爻六二也故初九往則主人有言睽之主爻六五也九二正應故遇主于巷巷謂離之中畫也豐之主爻六二也與初九隂陽相配故曰配主九四變則成明夷明夷亦以六二為主爻豐之主即明夷之主也故曰夷主賔客觀四利用賔于王姤二不利賔需上有不速之客三人來乾為賔賔之位在西北乾西北之卦也觀四變成乾賔者朝聘于王而為之賔也姤二所謂賔者指九四乾下畫而言也需上所謂不速之客三人者乾三陽也旅旅彖旅貞吉旅初旅瑣瑣二旅即次三旅焚其次四旅于處上旅人先笑後號咷旅者出外而不在家也旅之卦艮下離上所止之地附麗于外食宿起火在外而附麗于山上故為旅行人無妄三行人之得行人謂初九震之主爻也無妄下體震震為大塗初自三之人位而來初足履大塗故曰行人邑人訟二比五無妄三說已見前官隨初官有渝官者主其事者也隨初九為一卦之主故曰官虞屯三即鹿無虞中孚初虞吉虞者掌山澤之官屯三四五互艮為山三艮之下畫為山之鹿三無應比四而不相得是無人引導于其前也故曰無虞中孚初二三為兊三四五互艮初九在兊澤之內艮山之下山澤之虞也史巫巽二用史巫紛若史作策以告神巫歌舞以事神皆通誠意於鬼神者二三四互兊兊為巫書契取諸夬史亦取兊象武人履三武人為于大君巽初利武人之貞武人彊勇之人履六三巽初六皆以柔居剛而外比于剛蓋質柔志剛內柔外剛恃血氣之勇者故曰武人巽初取二之剛為已之剛故得稱人師師初師出二在師三師或輿尸四師左次五長子帥師泰上勿用師同人五大師克相遇謙上利用行師豫彖利建侯行師復上用行師坤為衆震為將帥師泰謙豫復五卦皆有坤有震同人之乾蓋變坤之衆而為富實剛彊故特言大師大謂陽也戎同人三伏戎于莽夬彖不利即戎二莫夜有戎離為甲胄戈兵同人九三離之上畫夬九二變剛為柔成離夬未變離則無甲胄戈兵故彖辭曰不利即戎冦屯二賁四睽上匪冦需三解三致冦至蒙上不利為冦利禦冦漸三利禦冦坎為盜謂以剛破柔而據有其中也屯蒙需賁睽解漸七卦言冦者皆有坎也小人匪人惡人師上既濟三小人勿用否二小人吉大有三小人弗克觀初小人無咎剝上小人剝廬遁四小人否大壯三小人用壯解五有孚于小人革上小人革靣比三比之匪人睽初見惡人小人之稱與大人君子為對或以位言或以德言庶人無位在民為農工商賈在官為府史胥徒則謂之小人天子諸侯卿大夫士有位則謂之大人君子此以位言也然古者有德然後有位無位必是無德於是無德者雖有位亦稱為小人此以德言也易之言小人蓋皆以位陽為君隂為民稱小人者必隂畫也師上六否六二觀初六解六五革上六是也若大有九三剝上九遁九四大壯九三既濟九三五爻則陽畫也爻辭所謂小人非指本爻謂設使小人得之則其占如此也比六三柔而不正為匪人睽九四剛而不正為惡人我蒙彖匪我求童蒙童蒙求我小畜彖小過五自我西郊觀三五觀我生頥初觀我柔頥益五惠我德井三為我心惻鼎二我仇有疾不我能即旅四我心不快中孚二我有好爵凡卦以主爻為我蒙以九二為主彖辭稱我者九二也小畜以六四為主彖辭稱我者六四也觀上體巽六四為主六三九五所稱之我六四也頥上體艮上九為主初九所稱之我上九也益以初九為主九五惠我德指初九惠我也井以九五為主九三我心惻指九五為我也鼎旅皆以六五為主九二我仇九四我心皆指六五為我也中孚上體巽六四為主九二所稱之我謂六四也小過上體震九四為主六五所稱之我謂九四也爾而頥初舍爾靈龜咸四朋從爾思中孚二吾與爾靡之解四解而拇而亦爾也它比初有它吉大過四有它吝中孚初有它不燕它者在彼之稱在此者為我在彼者為它大過中孚所謂它皆指應爻而言也首乾上比上無首離上折首既濟上未濟上濡其首頂大過上過涉滅頂靣革上小人革靣頄夬三壯于頄頰輔咸上咸其輔頰舌艮五艮其輔卦象乾為首爻位上為首頂靣頄頰輔皆首之物故首頂靣頰輔並見於上爻之辭輔在口內與牙車相依頰者兩臉輔之外也夬九三所謂頄指上六而言也艮六五所謂輔指上九而言也舌咸上咸卦兊上兊口有舌頥頥彖初二三四上上下二畫連中四畫虛頥口之象須賁二賁其須賁三四五上有頥之象六二在頥下須之象也目小畜三夫妻反目離為目小畜三四五互離耳噬嗑上何校滅耳坎為耳噬嗑三四五互坎鼻噬嗑二噬膚滅鼻荀爽九家逸象艮為鼻面之有鼻猶地之有山也噬嗑二三四互艮肱豐三折其右肱震為足而巽為股艮為手而兊為肱豐三四五互兊爻位則肱當五心坎彖有孚維心亨明夷四獲明夷之心益五有孚惠心上立心勿恆井三為我心惻艮二其心不快三薰心旅四我心不快五為心之位六卦言心者八皆指五而言先儒以四為心之位者非也坎之維心維五也明夷之獲心獲五也益之惠心惠五也艮之薰心薰五也井三之惻五惻之也艮二旅四之不快五不快也井旅之五主爻也則稱我心艮之五非主爻也則但稱其心益之九五在上九之內上九之心也立如三十而立之立謂固守之也立心勿恆者言上九之執守其心勿常久如此而不變也冀其能改之辭也脢咸五咸其脢脢背肉前與心相對腹明夷四入于左腹卦象坤為腹爻位四為腹身躬艮彖不獲其身四艮其身蒙三不有躬蹇二匪躬之故震上震不于其躬渙三渙其躬膈以下股以上皆身也腎所在處乃生身之所由起故以此為身前有腹後有背呂肉為夤皆當第四畫之位艮六四象傳釋身為躬者此政鞠躬之處艮卦所謂身蒙蹇震渙所謂躬皆指四而言也蒙六四得正而逺於陽女之能保有其躬者也六三不正而比二不能如六四之保有其躬故曰不有躬蹇二往應五而三四隔之所以蹇也蹇者三之為也蹇而又蹇者四之為也六二不以此尤人乃曰蹇蹇非四之故躬謂四也象傳曰終無尤也言六二終不以此而尤人也九四震之主爻六三者九四之鄰也而位與上相應震未至于四方至于三之時上六已知畏故象傳曰畏鄰戒也夤艮三列其夤夤背吕肉也與腎相直當四畫之位限艮三艮其限限上下之際謂身下接股股上連身處為限臀夬四姤三臀無膚困初臀困于株木臀尻也亦當卦之第四肉之柔者為膚夬姤四皆乘剛故象臀無膚夬四臀也以三為膚姤三膚也以四為臀困初六與九四為正應九四臀也正當巽木中畫為木之株故曰臀困于株木股咸三咸其股明夷二夷于左股股身之下膝之上也故當三畫之位腓咸二咸其腓艮二艮其腓腓足肚也膝之下足之上故當二畫之位趾拇噬嗑初屨校滅趾賁初賁其趾大壯初壯于趾夬初壯于前趾艮初艮其趾咸初咸其拇解四解而拇趾當初畫之位足之大趾為拇趾合一足而言拇分一趾而言膚剝四剝牀以膚夬四姤三無膚二為牀四當人之身卧于牀則下者為膚三在四之下膚也夬姤所謂膚亦指三而言臀之膚也噬嗑睽噬膚見後食物類尸師三師或輿尸五弟子輿尸人死曰尸四人位而隂畫死人之象故四為尸師下卦坎也坎為輿在四之下故曰輿尸鬼睽上載鬼一車鬼自坎取象離日之魂為神坎月之魄為鬼睽三四五互坎凡天地之氣屈而歸曰鬼人死之靈曰鬼物魅亦鬼之屬自人大人至此象之取於人者易纂言外翼卷三
