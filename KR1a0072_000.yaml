body:
  text: 易纂言外翼易類提要臣等謹案易纂言外翼八卷元吳澄撰澄所著易纂言義例散見各卦中不相統貫卷首所陳卦畫亦粗具梗概未及詳言因復作此書以暢明之纂言有通志堂刻本久行于世此書則𫝊本漸罕近遂散佚無存朱彞尊經義考注云見明崑山葉氏書目載有四冊而亦未睹其書今惟永樂大典尚分載各韻之下考澄所作小序原書蓋共十二篇一曰卦統以八經卦之純體合體者為經六十四卦之雜體者為緯乃上下經篇之所由分二曰卦對以奇偶反易成二卦或上下篇相對三曰卦變言奇偶復生奇偶其用無窮四曰卦主因無妄𫝊而推之以明一經之義五曰變卦言剛柔交相變而一卦可為六十四卦六曰互卦言中四爻復具二卦以為一卦七曰象例凡經之取象皆類聚之以觀其通八曰占例言元亨利貞吉凶無咎其義皆本于天道九曰辭例乃象例占例所未備而可以互見者十曰變例言揲蓍四營十八變之法十一曰易原明河圖洛書先後天圖十二曰易流備舉揚雄以下擬易之書今缺卦變變卦互卦三篇易流缺半篇易原疑亦不完餘尚首尾整齊無所遺失自唐定正義易遂以王弼為宗象數之學久置不講澄為纂言一決于象史謂其能盡破傳注之穿鑿故言易者多宗之是編類聚區分以求其理之㑹通如卦統卦對二篇言經之所以釐為上下乃程朱所未及象例諸篇闡明古義尤非元明諸儒空談妙悟者可比雖稍有殘缺而宏綱巨目尚可推尋謹依原目編次析為八卷俾與纂言相輔而行焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易纂言外翼十二篇原序羲皇卦畫先後一定自然而然文王分八卦為上下篇改移其次八經卦之純體合體者為之經四十八卦之雜體者為之緯述卦統第一六畫卦之不反易者八其反易者二十八為五十六卦奇陽偶隂無獨必有對或上下二篇相對或上下各篇自對二體之互易者亦然述卦對第二羲皇生卦奇偶之上生奇偶而已卦體既成而推其用則無窮焉乾坤變而為六子十辟六子十辟變而為四十六卦述卦變第三每卦以一畫為主無妄之傳所謂剛自外來而為主於內也述卦主第四易以剛柔相推而生變化剛畫變則化柔柔畫變則化剛而一卦可為六十四卦述變卦第五重卦有上下二體又以卦中四畫交互取之二三四成下體三四五成上體述互卦第六羲皇所畫之卦畫謂之象文王所名之卦名謂之象彖辭爻辭泛取所肖之物亦謂之象述象例第七聖人畫卦以明天道生蓍以前民用彖爻之辭為占設也述占例第八辭有象辭有占辭象之中亦有占占之中亦有象既互見矣猶有遺者復掇拾之通謂之辭述辭例第九揲蓍十八變而成一卦以動者尚其變謂蓍之變也述變例第十羲皇心契天地自然之易將畫八卦而有龍馬負圖出於河此易之原也洛書後出神禹因之叙九疇其河圖之配與述易原第十一邵子著書立言無一不本於羲皇之卦圖揚氏自三才之三起數而撰太𤣥司馬氏自五行之十起數而撰潛虛蔡氏自九疇之九起數而撰洪範皇極內篇皆易之𣲖也然邵子從容乎羲畫之內三家則奔迸乎羲畫之外矣邵其經流之𣲖揚馬蔡其支流之𣲖與述易流第十二凡十二篇是為易纂言外翼云
