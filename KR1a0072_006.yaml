body:
  text: 易纂言外翼卷六元呉澄撰辭例第九案辭例標目原本在習坎彖初之上乾乾至故附於此初無篇名今考文義應在辭例篇謹校改乾乾九三謙謙初六坎坎六三蹇蹇六二夬夬九三九五井井彖以上彖爻之辭重用卦名者凡六卦案末節有云卦名之重字者己見象例即指此六卦考文義正宜屬辭例後文殆校者誤注非澄原書之文也謹校改屯二屯如邅如五屯其膏蒙初發蒙二包蒙四困蒙五童蒙上擊蒙需初需于郊二需于沙三需于泥四需于血五需于酒食訟二四不克訟五訟元吉師初師出二在師三師或輿尸四師左次五長子帥師比初二三四上比之五顯比履初素履二履道三跛能履三四履虎尾五夬覆上視履否二否亨五休否上傾否先否同人初同人于門二同人于宗五同人先號咷而後笑上同人于郊謙二上鳴謙三勞謙四撝謙豫初鳴豫三盱豫四由豫上㝠豫隨三隨有求得四隨有獲蠱初三五幹父之蠱二幹母之蠱四裕父之蠱臨初二咸臨三甘臨四至臨五知臨上敦臨觀初童觀二闚觀三五觀我生四觀國之光上觀其生噬嗑二噬膚三噬腊肉四噬乾胏五噬乾肉賁初賁其趾二賁其須三賁如濡如四賁如皤如五賁于邱園上白賁剥初二四剥牀三剥之上剥廬復彖反復來復初不逺復二休復三頻復四獨復五敦復上迷復无妄初无妄往三无妄之災五无妄之疾上无妄行頤彖觀頤初朶頤二四顛頤二邱頤三拂頤上由頤大過上過渉習坎初習坎入于坎窞二坎有險三入于坎窞五坎不盈離二黄離三日昃之離咸初咸其拇二咸其腓三咸其股五咸其脢上咸其輔頰舌恒初浚恒三不恒其德五恒其德上振恒遯初遯尾三係遯四好遯五嘉遯上肥遯大壯初壯于趾三小人用壯四壯于大輿之輹晉初晉如摧如二晉如愁如四晉如鼫鼠上晉其角明夷初明夷于飛二明夷夷于左股三明夷于南狩四獲明夷之心五箕子之明夷上不明晦家人初閑有家三家人嗃嗃四富家五王假有家睽四上睽孤蹇初三四上往蹇五大蹇解四解而拇五君子維有解損初酌損之二上弗損益之三損一人四損其疾按此下益卦言益者三爻篇中未及而原列之卦又與後五十四卦合蓋此書脱訛者多矣他類此姤上姤其角萃初乃亂乃萃三萃如嗟如五萃有位升初允升三升虚邑五升階上冥升困初臀困于株木二困于酒食三困于石四困于金車五困于赤紱上困于葛藟于臲卼井彖不改井初井泥二井谷三井渫四井甃五井洌上井收革初黄牛之革二已日乃革之三革言上革靣鼎初鼎顛趾二鼎有實三鼎耳革四鼎折足五鼎黄耳上鼎玉鉉震彖震驚初二震來三震蘇蘇震行四震遂泥五震往來上震索索震不於其躬艮初艮其趾二艮其腓三艮其限四艮其身五艮其輔上敦艮漸初鴻漸于干二鴻漸于磐三鴻漸于陸四鴻漸于木五鴻漸于陵上鴻漸于陸今作逵歸妹初歸妹以娣三歸妹以須四歸妹愆期五帝乙歸妹豐二四豐其蔀三豐其沛上豐其屋旅彖旅貞吉初旅瑣瑣二旅即次三旅焚其次四旅于處上旅人先笑後號咷巽二巽在牀下三頻巽兌初和兌二孚兌三來兌四商兌上引兌渙二渙奔其机三渙其躬四渙其羣涣有丘五涣汗其大號渙王居上渙其血節彖上苦節三不節若四安節五甘節小過二過其祖三弗過防之四弗過遇之上弗遇過之未濟彖小狐汔濟三未濟征㐫以上彖爻之辭用卦名者凡五十四卦師泰上勿用師同人五大師克相遇謙上利用行師豫彖利建侯行師復上用行師終有大敗師一陽五隂以震統坤衆也謙豫復皆一陽五隂亦是震統坤衆泰亦有坤衆三四五互震統之同人師之正對師以五隂畫為衆同人則五陽畫為大故曰大師履坤初履霜離初履錯然歸妹初跛能履初畫地也二為人履之否遯四小人否遯九四變為柔與三相易則成否師初以律否臧鼎初利出否並音鄙否惡也遯四亦有讀為鄙者今兼存二義隨咸三執其隨艮二不拯其隨咸之三與初相易艮三畫變而六二獨不變皆為隨觀頤彖觀頤初觀我朶頤觀與頤皆二陽之卦頤之初與五相易則為觀噬嗑睽五厥宗噬膚睽之六五與九二應九二變為柔則成噬嗑剥兌五孚于剥上六一隂剥陽者也九五孚于上與之易位而處則將悉消九四九二初九三陽而為剥矣復訟四復即命小畜初復自道二牽復泰三無往不復上城復于隍睽初喪馬勿逐自復解彖其來復吉漸三夫征不復凡言復者皆謂自上而反於下自外而反於内也離否四疇離祉小過上飛鳥離之否三四相易成離小過上六變為剛成複體之離咸臨初二咸臨臨初九九二與六四六五交感相易而成咸上體以臨其下矣恒需初利用恒豫五恒不死益上立心勿恒需初九變為柔得恒下體豫卦震上即恒上體壯明夷二涣初用拯馬壯夬初壯于前趾三壯于頄姤彖女壯明夷六二變為剛成泰大壯四陽自泰三陽而息夬初九九三變為柔渙初六變為剛則四陽二隂皆得壯之變體壯之初九變為柔六五上六變為剛則占以姤彖故姤彖亦以壯為辭夷豐四遇其夷主涣四匪夷所思豐之九四變為柔涣之五畫俱變而六四獨不變皆成明夷家蒙二子克家師上開國承家大畜彖不家食損上得臣无家豐上蔀其家離象人之家豐卦離下師上六變為剛及蒙損皆二三四五上肖離大畜三四五上肖離益損二五上益之益損之反體夬履五夬履夬與履二體互易升同人三升其髙陵同人二三四互得升下體巽困蒙四困蒙困與蒙下體同上體正對革遯二執之用黄牛之革鼎三鼎耳革革自遯初上相易而變鼎者革之反體震未濟四震用伐鬼方未濟九四變為柔二三四成震歸妹泰五帝乙歸妹以祉漸彖女歸吉歸妹自泰而變漸者歸妹之反體以上彖爻之辭用他卦卦名者凡二十一卦孚需彖訟彖比初小畜四五隨四觀彖習坎彖大壯初家人上解五損彖益三五萃初革三四五豐二中孚五未濟五上有孚凡二十一泰三其孚于食四不戒以孚大有五厥孚交如隨五孚于嘉睽四交孚解四朋至斯孚夬彖孚號姤初羸豕孚萃二升二孚乃利用禴革彖已日乃孚兌二孚兌五孚于剥晉初罔孚萃五匪孚中孚之卦兌下巽上互震互艮合而肖離故凡彖爻之辭言孚者必有此五卦之體兼得四卦之體者二損有艮離震兌益有巽艮離震也得三卦之體者八小畜有巽離兌隨有兌艮震習坎有艮離震萃有艮兌巽革有兌巽離豐有震兌離兌有兌巽離也按原本衍豐有震兌離兌有兌巽離十字又有脱文得二卦之體者十需大有睽有離兌訟家人有巽離泰大壯有震兌觀有巽艮晉有離艮解有震離也得一卦之體者四比有艮夬有兌姤有巽未濟有離也孚者占也非象也然亦是卦名故附於此習坎彖初習坎坤二不習習重也坎下坎上二坎相重故曰習坎以後重離重震重艮重巽重兌皆習也卦序重坎在六字之先故加習字以例後五卦惟乾坤雖重不可言習蓋重坎二水也重離二火也重震二雷也重艮二山也重巽二風也重兌二澤也重乾則非有二天重坤則非有二地也坤之大不習者有形之最大唯一坤而已不再有一物如坤之大者也故曰不習獨復四獨復夬三獨行復五隂之卦唯有一陽而六四獨與初之一陽為應夬五陽之卦唯有一隂而九四獨與上之一隂為應故皆曰獨敦臨上敦臨復五敦復艮上敦艮敦厚也至厚者坤臨上復五皆在四畫坤之上艮上變為柔亦居坤之上畫故皆曰敦言下履厚地也休否五休否復二休復人憩息於木旁為休否三四五互巽為木復之下體震為竹為萑葦皆有庇䕃可依以息者嘉遯五嘉遯隨五孚于嘉離上有嘉遯五隨五皆以剛中正與柔中正為應如妃耦之曰嘉耦婚禮之曰嘉禮離上之有嘉則占也如有福有慶之比安坤彖訟四安貞節四安節安静者隂之德坤純隂至静故安節四隂得正位故安訟四之剛渝而變為柔則亦隂得正位也甘臨三甘臨節五甘節甘者坤木之味臨三坤之下畫兌體之終胥説之極故為巧言之甘節五剛變為柔成坤以柔濟剛而得中其剛不過節之不苦者也故為中節之甘富家人四富家小畜五富以其鄰泰四謙五不富以其鄰陽實為富隂虚為不富小畜五陽也故曰富泰四謙五隂也故曰不富家人上體九五為王家九陽實家之富者六四以柔承剛猶后之承王柔變為剛實是家之富與王同也實頤彖自求口實鼎二有實既濟五實受其福頤之初畫剛實能自實其口鼎之二既濟之五皆剛實者也裕蠱四裕父之蠱晉初罔孚裕无咎裕有寛緩自足之意隂柔不能勇於進為故爾蠱六四處父蠱之後而若是何望其能治蠱哉晉之初六亦然人罔孚而恬不以為意適值斯時不當急進所以得无咎也碩剥上碩果蹇上來碩碩大也陽為大剥上蹇五皆陽畫也光需彖光亨觀四觀國之光未濟五君子之光光者天之光需下體乾觀四變為剛未濟五變為剛則上體皆成乾濡賁三濡如夬三獨行遇雨若濡既濟初未濟彖初濡其尾既濟上未濟上濡其首濡取坎象坎為雨為水能濡賁二三四互坎夬三變為柔三四五上成四畫之坎既濟未濟皆有正體互體二坎至臨四至臨坤初堅氷至需三解三致冦至解四朋至井彖汔至臨彖復上至于説文以鳥飛從髙下至地為至陽當在上而下臨隂初之陽當在四今下而在初是從髙而至於地也故曰至臨需解皆以坎為冦需之坎在上體解之三四五互坎冦三者其冦皆自外而至為自上而至下者解九四之朋謂九二也卦自艮變艮之上九下易二而為九二朋之自上而至下者也坤初之堅氷由天氣寒於上而後氷凍凝於下亦若自上而下然井彖之汔至至猶極也言幾及井口而未極於上也臨復之至于至猶言比及也與從上而下之至不同永坤用六比彖賁三益二萃五艮初小過四永貞凡七訟初不永陽能永隂不能永坤之純柔其利者以其變為純剛而能永也比以九五為主爻及賁之九三萃之九五皆陽剛故能永也益之六二艮之初六則戒之以勉其所不足也小過之九四則戒之以勿盡其所有餘也訟初隂柔是以不永所事引兌上引兌萃二引吉永者自然能長陽之為也引者不長而延之使長隂之為也引之字引弓也假借為五度之引度之十尺曰丈已可為長之最乃復増加五倍其長而曰引而復加其長猶引弓者滿而愈求其滿也兌上六之説極矣又延而長之故曰引兌萃六二之應九五非能久者也延之使長庶其得吉故曰引吉二爻皆隂柔也牽小畜二牽復夬四牽羊兌為羊之羣行牽聨而進故牽之義象羊小畜二三四互兌夬四變為柔二三四成兌故皆有牽象進前之謂牽反下之謂復如其進前之勢而牽聮以反於下是謂牽復夬之牽羊則牽而進前者也曵睽三輿曵既濟初未濟二曵其輪牽者牽而進前曵者曵而退後坎之象其於輪也為曵暌三四五互坎三輿也有曵之於後者而不能退既濟二三四互坎輪也初在其後曵之未濟三四五互坎輪也二在其後曵之逐大畜三良馬逐頤四其欲逐逐睽初震二既濟二勿逐逐者進於後而追其前者也允升初允升晉三衆允説文引升初六爻辭允作以此例之晉三衆允亦當作其字從􅋄從夲諧允聲􅋄者上徹也本者進趨也二字皆有進之義故字訓進今易文作允蓋從省也在乾二在田四在淵五在天師二在師隨四在道巽二上在牀下小過五在穴在者即此而居也自需四自穴小畜初自道小畜彖小過五自我西郊大有上姤五自天自者由彼而至也由豫四由豫頤上由頤豫之四頤之上皆卦主也以卦變言豫由四而成卦頤由上而成卦以卦象言震之大塗可由者也居屯初隨三頤五革上居貞凡四咸二居吉涣五王居无咎居者但可静而居於内不可動而行於外也處小畜上既雨既處旅四旅于處處者止也陽行隂止小畜之上旅之四剛變為柔則巽風為坎雨而風之行有暫止之時離火為艮山而旅之行有暫止之地也即屯三即鹿訟四即命夬彖即戎鼎二不我能即旅二即次即者就之也遇同人五相遇睽二遇主四遇元夫睽上夬三遇雨小過二遇其妣遇其臣四遇之上弗遇遇者與之相值也假家人五王假有家萃彖渙彖王假有廟豐彖王假之假至也退朝而適燕寢至於家也有事而見先王至於廟也王廵狩而至諸侯之國所謂王假之也反復彖反復其道蹇三往蹇來反反還也自外而還内也十月陽盡於上而十一月微陽生於下若自外而反於内然其反也由其故道而復也蹇卦自震變震之初九上往易六五而為九五震之九四下來易六三而為九三是蹇之九三不往外以䧟於險而來内以還於下也頻復三頻復巽三頻巽頻水厓也字本作頻世俗從省去水至水厓之不可進而止曰頻復三變為剛二三四成坎巽三變為柔初二三成坎三當下卦之終水之盡處也復巽之三皆以頻為象滅噬嗑初滅趾二滅鼻上滅耳大過上滅頂水漫出物之上物没入水之中是之謂滅過渉滅頂是也手持大臠之膚以噬而膚之大揜過其鼻足校在脛首校在項而足校之厚下揜及其趾首校之厚上揜及其耳其鼻其耳其趾之被遮揜有似物被水所漫没故亦曰滅發蒙初發蒙豐二發若發者開啓之也撤去幕巾為發蒙剖除障隔為發蔀蒙初豐二皆偶畫疏通而不窒塞蓋有九二九三九四之陽以開啓於其外也故曰發撃蒙上擊蒙益上或擊之擊者艮手所擊蒙艮上益有互艮皆以上九擊六三也執師五執言咸三執其隨遯二執之三爻言執亦取艮手之象師五變為剛三四五成艮咸遯皆艮下說小畜三大畜二輿說輹遯二莫之勝說睽上後說之弧困五乃徐有說二物昔相合而今相離為說舍屯三幾不如舍賁初舍車而徒頤初舍爾靈龜棄而弗用止而弗為去而弗顧均謂之舍何噬嗑上何校滅耳大畜上何天之衢何者以首戴之也卦位上為首故二卦皆於上爻言何勝遯二莫之勝說夬初往不勝為咎漸五終莫之勝三爻勝字皆平聲讀任也堪也或有作去聲讀而解為勝負之勝者勝負之勝易中云克不云勝也克蒙二子克家訟二四不克訟同人四弗克攻五大師克復上不克征既濟三克之克能也勝也勝亦兼能義春秋書克叚糓梁傳以為能勝也見乾二五訟彖蹇彖上萃彖升彖巽彖見大人凢八乾用九見羣龍蒙三見金夫睽初見惡人三見輿曵上見豕豐二四見斗三見沬困三不見其妻艮彖不見其人蠱四見吝姤初見㐫見謂目所覩也離為目巽為多白眼見兼取離目巽眼之象乾二五變為柔則上下二體皆成離訟困皆二三四互離蹇巽皆三四五互離睽離上豐離下蠱艮三四五上成四畫之離蒙二三四五上成五畫之離姤升巽下萃三四五互巽巽二體重巽又互離唯乾用九卦之全體六畫俱已變故見字不於卦體取象視履上視履履三歸妹二眇能視頤四虎視震上視矍矍視謂以目覩之也故於離目取象履歸妹二三四互離頤全卦六畫之離四變為剛則上體成離震初二三四四畫之離又上變為剛則上體成離闚觀二闚觀豐上闚其户闚者於門罅中竊視也觀三四五互艮為門六二在三四二偶畫之内自内而闚三四雙扉之門也豐震上艮之倒體上六在六五一偶畫之外自外而闚六五單扉之户也泣屯上泣血漣如中孚三或泣或歌泣者離目出涕也屯初二三四五五畫之離中孚全卦複體之離也屯上云泣血故項氏云於坎水取象涕離五出涕沱若萃上齎咨涕洟涕淚也目之液也而鼻之液亦或謂之涕目鼻之液皆人身之水故取坎象離二三四五萃三四五上成四畫之坎又萃三四五互巽為多白眼二三四互艮為鼻蓋目鼻之液自上而流下至三也目涕曰淚鼻涕曰洟單言涕者目涕也離五出涕是也合洟而言者鼻涕也萃上涕洟是也涕洟者鼻涕之洟也凡言泣者聲細而有淚涕者但有淚而無聲哭者聲大而有淚號者但有聲而無淚號同人五旅上號咷夬彖孚號二惕號上无號萃初乃亂乃萃若號渙五渙汗其大號號自兌口出聲夬萃兌上旅三四五互兌同人五變為柔三四五成兌渙五巽風之號亦兌倒體也嗟齎咨離三大耋之嗟五戚嗟若萃三嗟如節三嗟若萃上齎咨嗟亦兌口之歎聲萃兌上節兌下離三四五互兌齎咨二字與嗟字音同而聲轉義與嗟同笑同人五後笑萃初一握為笑震初後笑言啞啞旅五先笑笑者喜樂而口開兌中之奇畫坼而偶則成震兌口之開也故震有笑言之象同人萃旅皆有互兌歌離三不鼔缶而歌中孚三或歌歌聲亦自兌口而出離有互兌中孚兌下按中孚之卦巽上二三四互震全卦為複離六三爻辭曰或鼓者震之動也曰或罷者巽之懦也曰或泣者離目之出涕也曰或歌者兌口之出聲也鳴謙二上鳴謙豫初鳴豫震為雷雷發聲曰雷鳴又為馬之善鳴者豫震上謙三四五互震雷之鳴聲由下之剛畫謙二比震之剛畫謙上豫初應震之剛畫故皆曰鳴告泰上自邑告命夬彖告自邑告亦是兌口告之夬兌上泰二三四互兌求屯四求婚媾蒙彖匪我求童蒙童蒙求我隨三有求得坎二求小得求者隂陽相求也或以應而求或以比而求屯之初四相應故初九求六四陽求隂也蒙之二五相應故六五求九二隂求陽也隨之三四無應而相比故六三求九四而有得坎之二五同德不相應必也九二變為柔以隂小而求九五乃有得也錫訟上或錫之鞶𢃄師二王三錫命晉彖康侯用錫馬錫與也上之與下下之與上皆謂之錫王之錫命上錫下也康侯之錫馬下錫上也鞶𢃄之錫而曰或不知其誰何也拯明夷二渙初用拯馬壯艮二不拯其隨拯救也以陽之彊救隂之弱也明夷之六二九三拯之渙之初六九二拯之艮六二為九三之隨從而九三不拯之也艱泰三噬嗑四大畜三明夷彖艱貞凡四大有初艱則无咎大壯上艱則吉艱謂以艱難處之不可忽易也顛頤二四顛頤鼎初顛趾顛者人之首頂倒而居下謂之顛頤之二四在上而求養於初初在下而致養於上是上者下下者上也故曰顛頤鼎之顛趾賈誼所謂首顧居下足反居上者也迷坤彖先迷復上迷復迷昏惑也隂柔晦昧故迷然坤純隂倡始則迷復上六至終而迷者也冥豫上冥豫升上冥升凡卦之上為冥天上之位也故豫升上爻之辭皆曰冥幽履二歸妹二幽人井初幽谷凡卦之初為幽地下之位也井初幽谷是也履二歸妹二居人位而鄰於初之幽以其志在退隱於下故曰幽人卦位五上為天初二為地然五顯而上冥二見而初幽五乃人目所觀之天上則髙出人所觀者之上青霄𤣥逺故曰冥二乃人足所履之地初則深入人所履者之下黄泉黒暗故曰幽磐桓屯初磐石也已見象例桓木之植於地中者連二字為義以言其不可動也次且夬四姤三次且行不進也夬四姤三剛畫化為柔互巽下畫進退不果者也蹢躅姤初足不受羈絆跳踉欲走之意臲卼困上爻一作倪㐳臲或作隉或作臬卼或作杌人在高處立而不安也困九五為互巽之上畫上在互巽之上巽為木為髙猶立於髙木之上也凡辭之以連字為義者四卦共五坦坦履二愬愬履四翩翩泰四戔戔賁四眈眈逐逐頤四憧憧咸四嗃嗃嘻嘻家人三徐徐困四虩虩啞啞震初蘇蘇震三索索矍矍震上衎衎漸二瑣瑣旅初凡辭之以重字為義者十七卦共十其義各具經注案此下有卦名之重字者己見象例二句非原書之文謹刪去辨詳見前象例占例辭例之説有纂言之所已言而推廣餘意者有纂言之所未言而兼存别説者故間有微不同者焉
