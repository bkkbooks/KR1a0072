body:
  text: 易纂言外翼卷二元吳澄撰卦統第一經卦十六乾坤父母之純統緯卦八屯蒙需訟師比小畜履泰否父母之合統緯卦十六同人大有謙豫隨蠱臨觀噬嗑賁剝復無妄大畜頤大過坎離中男中女之純終上篇咸恆少男少女長男長女之合統緯卦八遁大壯晉明夷家人睽蹇解損益少男少女長男長女之合統緯卦八夬姤萃升困井革鼎震艮長男少男之純統緯卦四漸歸妹豐旅巽兌長女少女之純統緯卦四渙節中孚小過既濟未濟中男中女之合終下篇六十四卦分屬上下二篇蓋有意義朱子但云以其簡帙重大而分豈其然哉以今考之有經卦焉有緯卦焉八卦正體對體自重者為經卦八卦各體錯雜相重者為緯卦上下二篇經卦十六緯卦四十八上篇以乾坤二卦為經而二十四卦為緯下篇以震艮巽兌四卦為經而二十四卦為緯坎離者乾坤二卦之用震艮巽兌四卦之管轄也故以為二篇之終上篇始以乾坤之純統八卦次以乾坤之合統十六卦而終之以坎離之純下篇始以震艮巽兌之合統十六卦次以震艮巽兌之純統八卦而終之以坎離之合頤大過中孚小過四卦獨不反易肖坎離者也故置二篇緯卦之後而附坎離純體合體之前上篇經卦始純次合而終於純下篇經卦始合次純而終於合純體統卦八而合體所統倍之上篇純體二專統八卦下篇純體四分統八卦上篇合體二專統十六卦下篇合體四分統十六卦此以文王六十四卦之次序明經卦之統緯卦經卦上篇始二老之純次二老之合而終於二中之純下篇始少長之合次少長之純而終於二中之合緯卦少長相合為不易之卦者四頤大過中孚小過是也長貞居上篇少貞居下篇長少相合為反易之卦者四隨蠱漸歸妹是也長貞居上篇少貞居下篇二陽四隂二隂四陽反易者四卦臨觀遁大壯是也二陽居上篇二隂居下篇一陽五隂一隂五陽反易者四卦剝復夬姤是也一陽居上篇一隂居下篇中男合乾父中女合坤母反易者各二卦需訟晉明夷是也男合父居上女合母居下長少二男合乾父少長二女合坤母反易者各二卦無妄大畜萃升是也男合父居上女合母居下長少二男合中男少長二女合中女反易者各二卦屯蒙革鼎是也男居上女居下長少二男合中女少長二女合中男反易者各二卦噬嗑賁困井是也二男居上二女居下上篇自對者中男合坤母中女合乾父反易者各二師比大有同人是也長少二女合乾父少長二男合坤母反易者各二小畜履謙豫是也按上篇自對者惟此八卦皆三男三女從父母之卦也然男從母女從父各異其類故為上篇自對之卦其他三男三女從父母而男從父女從母各同其類者八卦則分屬上下二篇下篇自對者長少二女合中女少長二男合中男反易者各二家人睽蹇解是也長少二男合中女長少二女合中男反易者各二豐旅渙節是也按下篇自對者惟此八卦皆三男三女自相從之卦也然中貞長悔少貞中悔各逆其次故為下篇自對之卦其他三男三女自相從而長貞中悔中貞少悔各順其次者八卦則分屬上下二篇也此明上下篇義上下篇義諸説類多牽強附會今據其可推者如此更過求之則鑿矣卦對第二案此篇屯蒙需訟條下注云此四卦與下篇四卦為對臨觀鼎革遁大壯諸條下俱有注餘並無之原本疑有脫文今未敢輒補姑仍其舊乾坤案原本脫此二卦謹校補屯蒙需訟此四卦與下篇四卦為對師比同人大有履小畜謙豫泰否隨蠱臨觀噬嗑賁剝復無妄大畜此八卦與下篇八卦為對頥大過坎離咸恆損益鼎革晉明夷此四卦與上篇四卦為對家人睽解蹇豐旅渙節漸歸妹遁大壯井困夬姤升萃此八卦與上篇八卦為對中孚小過既濟未濟卦畫奇偶正對二篇共二十對上篇七下篇七上下篇六正對不反易者四上篇三下篇一共八卦正對兼反易者四上篇二下篇二共八卦反易取正對者十二上篇二下篇四上下篇六共四十八卦上篇正對不反易三乾坤一坎離二頤大過三也凡六卦正對兼反易二泰否一隨蠱二也凡四卦反易取正對二師比同人大有一小畜履謙豫二也凡八卦下篇正對不反易一中孚小過也凡二卦正對兼反易二既濟未濟一漸歸妹二也凡四卦反易取正對四咸恆損益一震艮巽兌二家人睽解蹇三豐旅渙節四也凡十六卦上下篇反易取正對六屯蒙鼎革一需訟晉明夷二臨觀遁大壯三噬嗑賁井困四剝復夬姤五無妄大畜升萃六也凡二十四卦此各卦竒偶二畫之對乾坤坎離此四卦為上篇之綱屯蒙小畜履隨蠱臨觀噬嗑賁無妄大畜頤大過屯蒙至大過十四卦與下篇之卦互易需師泰同人謙豫訟比否大有剝復震艮巽兊此四卦為下篇之綱解蹇姤夬漸歸妹萃升豐旅大壯遁小過中孚解蹇至中孚十四卦與上篇之卦互易咸恆晉家人睽困井既濟損益明夷鼎革節渙未濟卦體上下互易二篇共十八對上下篇八上篇五下篇五純卦八為上下二篇之綱者不與上下篇不反易卦二體自易二頤小過一大過中孚二也凡四卦相反易卦二體相易六屯蒙解蹇一小畜履姤夬二隨蠱歸妹漸三臨觀萃升四噬嗑賁豐旅五無妄大畜大壯遁六也凡二十四卦上篇反易卦二體自易四需訟一師比二泰否三同人大有四也凡八卦反易卦二體相易一謙豫剝復凡四卦下篇反易卦二體自易二晉明夷一既濟未濟二也凡四卦反易卦二體相易三咸恆損益一家人睽鼎革二困井節渙三也凡十二卦此各卦上下二體之對或曰夫子之十傳終於序卦雜卦子之十二翼始於卦統卦對何也曰卦統者序卦傳之餘意也卦對者雜卦傳之遺譜也卦變第三原缺謹據小序校補卦主第四乾上坤上震四蹇五蒙二巽四睽五革二艮上解二屯五兌上家人二鼎五坎五小過四頤上離五中孚四大過上復初師二謙三剝五豫四比五姤初同人二履三夬五小畜四大有五臨二升初明夷二觀四晉五萃上遁二無妄初訟二大壯四需五大畜上泰三恆初井五蠱初豐二既濟二賁二歸妹三節五損三否三益初噬嗑五隨初渙二未濟二困二漸三旅五咸三小成之卦八震巽下為主坎離中為主艮兌上為主此因乾坤交易而定也震一陽巽一隂下為主兊二陽艮二隂中為主乾三陽坤三隂上為主此因隂陽消長而定也艮兊或主上或主中者以乾坤之交而言則主上畫故遁二隂主二剝五隂主五艮之中畫為主也臨二陽主二夬五陽主五兊之中畫為主也大成之卦六十有四復姤一陽一隂主初臨遁二陽二隂主二泰否三陽三隂主三大壯觀四陽四隂主四夬剝五陽五隂主五乾坤六陽六隂主上乾坤為主之卦四乾坤主上否泰主三乾坤父母也其尊無上故自主其重卦合卦而不復為他卦主者猶黃鐘大吕二律之獨尊但自為宫而不復為他卦役也坎離為主之卦二十有八坎離屯鼎需晉比大有蹇睽井噬嗑節旅十有四卦主五蒙革訟明夷師同人解家人困賁渙豐未濟既濟十有四卦主二坎離得乾坤中畫自主其重卦合卦而又各主十二卦所主倍於震巽艮兊四卦者貴中也故卦之有坎離者必以坎離為主惟無坎離者然後震巽艮兊為主也震巽為主之卦十有六震巽大壯觀小過中孚豫小畜八卦主四復姤無妄升益恆隨蠱八卦主初艮兊為主之卦十有六艮兊頤大過大畜萃六卦主上謙履咸損漸歸妹六卦主三遁臨二卦主二剝夬二卦主五震巽艮兊四卦自主其重卦合卦而又各主六卦半於坎離之所主也乾泰坤否坎屯需比蹇井節蒙訟師解困渙未濟離鼎晉大有睽噬嗑旅革明夷同人家人賁豐既濟以上乾坤坎離四正不易之卦為主者凡三十有二卦震復大壯小過豫無妄恆隨巽姤觀中孚小畜井益蠱艮遁剝頤謙大畜咸漸兊臨夬大過履萃損歸妹以上震巽艮兊二變反易之卦為主者凡三十有二卦主五之卦十有六坎離各七艮兊各一主二之卦十有六坎離各七艮兊各一主四之卦八震巽各四主初之卦八震巽各四主上之卦八艮兊各三乾坤各一主三之卦八艮兊各三乾坤各一卦有二主者二十卦不兼主而專主或主內或主外何也曰坎離水火之重既濟未濟水火之合震巽風雷之重恆益風雷之合艮兊山澤之重咸損山澤之合重者悔為主合者貞為主也頤大過中孚小過隨蠱漸歸妹雷風山澤之互相合者四卦無反對四卦有反對者貞為主也變卦第五互卦第六案變卦互卦二篇原缺謹據小序補其目於此易纂言外翼卷一
