body:
  text: 易纂言外翼卷五元吳澄撰占例第八元元亨利貞乾彖屯彖隨彖無妄彖革彖元亨坤彖大有彖蠱彖升彖鼎彖元吉坤五訟五履上泰五復初大畜四離二損彖五益初五井上渙四元永貞比彖萃五元首也文人上為元在人一身之上為衆體之長凡大德大位長於人者曰元至若國之公侯官之正長家之宗嫡皆是也元亨元者亨也元吉元者吉也元永貞元者長永主其事也衛靈公之立占曰元亨蓋孟縶廢疾不可為後則靈公當立者為元又其名曰元其占元者當亨也南蒯之叛占曰元吉蓋君為元首聖為元德得之則吉位非元首德非元德則吉轉為凶矣案臨彖亦具四德原本不及知傳寫脫落者多矣他類此亨蒙彖小畜彖履彖否二同人彖謙彖噬嗑彖賁彖復彖大畜上大過彖坎彖離彖咸彖恆彖遁彖萃彖困彖震彖豐彖兊彖渙彖節彖四小過彖未濟彖元亨小亨旅彖巽彖既濟彖吉亨泰彖否初光亨需彖亨者嘉之會字與獻享之享同享謂備物以獻也字與烹煮之烹同烹煮既熟則以獻神故由烹煮而借為獻享之享天神曰祀地示曰祭宗廟曰享蓋祀天祭地皆不如宗廟之備物故宗廟得享之名朝聘之後有享蓋朝聘之禮皆圭璋特逹以簡為敬既朝既聘而後享則束帛加璧庭實旅百凡其國所有無一不致諸物備具故曰享禮賔有燕有食有享燕則飲多於食食則食多於飲惟享禮酒食俱富既醉既飽其禮豐厚故曰享易經所謂亨者文明極盛之時禮記所謂百順之備董子所謂諸物必至是也衆美之聚如備物之享然故又因獻享而借為元亨之亨初蓋音同皆作許薑切讀坤彖傳品物咸亨與無疆協詩商頌莫敢不來享與來王協則元亨之亨獻享之享同音也明矣利利貞蒙彖大畜彖恆彖大壯彖明夷五損二鼎五漸彖渙彖中孚彖既濟彖亨利貞咸彖萃彖兊彖小過彖利貞亨離彖小利貞遁彖利牝馬之貞坤彖利君子貞同人彖利幽人之貞歸妹二利武人之貞巽初利女貞觀二家人彖利于不息之貞升上利永貞坤用六艮初利居貞屯初隨三利艱貞噬嗑四大畜三明夷彖無不利坤二屯四大有上謙四五臨二剝五大過二遁上晉五解上鼎上巽五利見大人乾二五訟彖蹇彖上萃彖巽彖利有攸往賁彖復彖無妄二大畜三大過彖恆彖損彖上益彖夬彖萃彖巽彖利涉大川需彖同人彖蠱彖大畜彖頥上益彖渙彖中孚彖未濟三利西南坤彖蹇彖解彖利建侯屯彖初利建侯行師豫彖利禦寇蒙上漸三利執言師五利用行師謙上利用侵伐謙五利用刑人蒙初利用獄噬嗑彖利用恆需初利用賔于王觀四利用為大作益初利用為依遷國益四利用禴萃二升二利用享祀困二利用祭祀困五利己大畜初利出否鼎初無攸利蒙三臨三無妄上頥三恆初大壯上萃三歸妹彖上未濟彖不利君子貞否彖不利有攸往剝彖無妄彖不利涉大川訟彖不利東北蹇彖不利為冦蒙上不利即戎夬彖不利賔姤二利者冝于其事如刀之刈禾順易而不難也元亨利貞者元者能致亨而又利于貞也亨利貞者既能致亨而又利于貞也亨在利之前利貞亨者利於貞而後致亨也亨在利之後貞貞吉亨否初貞吉需彖五比二四履二否初謙二豫二隨初臨初頥彖咸四遁五大壯二四晉初二家人二蹇彖解二損上姤初升五旅彖巽五未濟二四五貞凶師五隨四頥三恆初巽上節上中孚上貞吝泰上恆三晉上解三貞厲訟三小畜上履五噬嗑五大壯三晉四革三貞疾豫五利貞見前可貞坤三無妄四損彖不可貞蠱二節彖安貞坤彖訟四居貞頥五革上餘見前利居貞永貞賁三益二小過四餘見前元永貞利永貞艱貞泰三餘見前利艱貞蔑貞剝初二疾貞明夷三小貞大貞屯五君子貞見前女子貞屯二女貞見前婦貞小畜上童僕貞旅二三幽人之貞見前武人之貞見前牝馬之貞見前不息之貞升上貞大人師彖困彖貞婦人夫子恆五案君子貞及女貞各條下原本無見前二字體例似欠畫一謹校補貞者正主其事也書云豫二人共貞繫辭傳云貞觀貞明貞勝貞夫一其字從卜正主其事而問於卜筮曰貞故周官云凡國大貞卜立君卜大封又云國大遷大師則貞龜又云貞來嵗之美惡文言傳曰貞者事之幹也蓋古字通用貞與楨幹之楨通楨幹木之正身枝葉因之而生又借用以為築墻之木皆取正立之意幹事者正主其事之謂彖傳象傳専釋於正正之為言是也當也而有主之之意焉猶官正酒正之正官之名謂正者蓋主其事非正不能若以是為非以非為是則敗事矣故但言正而主事之意在其中利貞者利於正主其事也師傳言能以衆正謂能以衆而正主其事者湯武則然故曰可以王矣大壯傳言大者正也謂陽剛大人正主其事也正主其事者以陽剛大人而天地萬物之情可見矣凡彖爻之辭言元亨者謂元者亨也言利貞者謂利於貞也元者言其人也貞者言其事也亨者利者言其占也文言傳釋乾彖四字之訓而總言曰四德蓋推廣而言非文王彖辭本意也後又因之以配四時春夏秋冬以配五常仁義禮智辭理極精而謂乾之元亨利貞為四與屯臨隨無妄革之元亨利貞為二者不同則非也如邵伯溫釋皇極經世書之名而曰至大之謂皇至中之謂極至常之謂經至變之謂世亦分釋其字義云爾豈真謂皇極經世為四字也哉以乾彖之辭與屯隨等卦之辭為一例者是矣但曰大亨者言其亨之大而不曰大者亨曰利於正者言其理之正而不曰以正主其事亦微有未盡者焉吉乾用九屯五蒙二五訟四比彖五小畜初二泰彖同人四大有五上謙初三隨五臨二五上噬嗑四復二大畜五頥四大過四離彖五咸彖遁三大壯上明夷二家人五睽上蹇上解彖益二萃二升四革四鼎二震初艮上漸彖二五上歸妹五豐二四五巽二五兊初二渙初節五中孚彖初未濟五有它吉比初大人吉師彖否五困彖君子吉遁四小人吉否二婦人吉恆五小事吉睽彖元吉見前大吉家人四萃四升初鼎上小過彖初吉既濟彖中吉訟彖師二終吉需二上訟初三履四蠱初賁五家人上鼎三貞吉見前居貞吉見前永貞吉見前安貞吉見前艱貞吉見前小貞吉屯五居吉咸二往吉屯四無妄初晉五征吉泰初升彖困上革二歸妹初厲吉頥上晉上家人三案元吉及貞吉諸條原本俱無見前二字體例似欠畫一謹校補吉謂休祥也悔有悔乾上豫三困上小有悔蠱三無悔同人上復五咸五大壯五渙三未濟五無祗悔復初悔亡咸四恆二大壯四晉三五家人初睽初五夬四萃五革彖四艮五巽四五兊二渙二節上未濟四豫三悔遲家人三悔厲困上動悔鼎三虧悔悔謂可追恨也吉凶悔吝四字吉凶吝只一義悔有二義以占而言者與吉凶吝為類有悔無悔悔亡是也單言悔者與貞字為對非言占也貞者於理是而正主其事也悔者於理非而欲改其事也豫三之悔遲困上之動悔皆謂欲改悔者下言有悔乃是占也家人三之悔厲鼎三之虧悔亦與悔遲動悔之悔同凶師初三比上履三豫初噬嗑上剝初二四復上頥初大過三上坎初上離三咸二恆上益上困三井彖鼎四漸三豐上旅上兊三節二小過初三上後夫凶比彖夫子凶恆五見凶姤初起凶姤四有凶臨彖夬三終有凶夬上終凶訟彖貞凶征凶頥二大壯初損二困二革三上震上歸妹彖未濟三君子征凶小畜上凶謂禍災也吝蒙四同人二賁五姤上困四巽三未濟初君子吝觀初有它吝大過四見吝蠱四小吝噬嗑三萃三終吝家人三貞吝見前往吝屯三蒙初咸三吝謂可慊可少也吉如時之春陽稚而未老中而不過物初而美事初而善故吉邵子所謂嵗之春初日之早晨花之半開飲之微醉時也悔如時之夏陽極而隂生治平之久蕃盛之甚闕敗由是而起故有悔邵子所謂花之離披飲之酩酊時也凶如時之秋隂長而陽消天地肅殺萬物凋瘁故凶吝如時之冬隂極而陽生凶之餘烈也比之凶則殺故名吝矣或問子言悔有二義何也曰悔之為占辭與吉凶吝三字為類者既言之矣悔之不為占辭而與貞之一字為對者今詳言之貞如木之有楨幹一定不易者也悔如事之有改悔更易不定者也故奕者既下子而復欲改移謂之悔重卦之內卦為貞外卦為悔蓋是以內之一卦為主以其一定故曰貞外之八卦為客而更迭重於內卦之上以其屢更故曰悔若以元亨利貞吉悔凶吝八者之占擬之元配春亨配夏利配秋貞配冬吉配春悔配夏凶配秋吝配冬春者動之中秋者靜之中唯南方之夏乃動之極故悔為至動北方之冬乃靜之極故貞為至靜也無咎乾三四坤四需初師彖二四五比彖初小畜四履初泰三否四同人初大有初二四豫上隨彖蠱初臨三四上噬嗑初二三五賁上剝三復三無妄四頥四大過初五上習坎四五離初上恆彖晉初上睽初二四解初損彖初四上益初三夬三五姤二上萃初二三四五上升二四困彖二井四革二鼎初震上艮彖初四漸初四豐初三巽二渙五上節初三中孚四五小過二四既濟初未濟上無大咎蠱三姤三君子無咎觀五上小人無咎觀初何咎小畜初隨四睽五匪咎大有初為咎夬初繫辭傳曰無咎者善補過也又曰震無咎者存乎悔謂本當有咎以能改悔修補其過故得無咎故無咎之辭所以善其能補過也各處意義雖或小不同然大槩如是而已獨王弼以節卦六三之無咎為無所歸咎與諸爻無咎之義不同程子又因王氏若大過上姤上萃上困二豐三皆從節六三之例今不敢從也有孚有孚之占二十四單言孚十三罔孚一匪孚一詳載辭例此以實感彼以實應曰孚凡言有孚者謂有人來孚於已彼以信應此也單言孚者謂自己往孚於人此以信感彼也易之為占曰吉曰凶而已悔吝凶之微者也無咎吉之淺者也五者占之大凡也故繫辭傳以此五占並言五者之外唯有孚一占最多蓋吉凶悔吝無咎之占専於己有孚之占徴於人宜配五占而為六其餘福祉喜慶等占吉無咎之屬也厲害眚災等占凶悔吝之屬也福泰三有福晉二受兹介福井三並受其福既濟五實受其福祉泰五以祉否四離祉喜否上後喜無妄五損四兊四有喜慶豐五有慶福祉喜慶占之同於吉者無妄損兊以疾愈為有喜蓋疾則可憂愈則可喜此喜之一事爾譽坤四大過五無譽蠱五用譽蹇初來譽豐五慶譽旅五譽命命訟四即命師二錫命師上否四有命泰上告命革四改命賞未濟四有賞譽者受其名賞者受其實命者使之貴賞者使之富其占亦與福祉喜慶相近厲乾三蠱初復三頥上遁初三晉上家人三睽四姤三震二五艮三漸初旅三小過四既濟上有厲大畜初夬彖貞厲訟三小畜上履五噬嗑五大壯三晉四革三厲者危也居髙者危六畫中三居下之上為危地故厲之占二十六而三居其十上雖危然已在一卦之外而時亦終矣不如三之危為甚也害大有初無交害害者利之反也易中但以不利無攸利為利之反惟大有之初以害為占眚無眚訟二震三有眚無妄彖上災無妄三旅初災眚復上小過上眚謂過眚眚雖內有而非己故為其過適然者也無妄心雖無私事不合正理則為過上九身雖無妄行不合時宜則為過故曰有眚訟九二逋而安小弱之邑震六三行而避震動之威皆無過者也故曰無眚災謂禍災災雖外至而由己自召其禍宜然者也無妄六三不幸而遇禍則曰無妄之災旅初六瑣瑣而取禍則曰災也易曰災眚書言眚災二者不同眚災者已偶過失而遂罹災其災也非己所致之災也與宜然之災異矣帝典云眚災肆赦周誥云眚災適爾是也災眚者已招禍災而遂成眚其眚也由己所致之眚也與適然之眚異矣復上六有災眚小過上六是謂災眚是也復上六迷途至終而圖復小過九三鳥飛衝上而離网其凶皆自取禍災而有此過眚也故曰災眚厲害災眚占之鄰於凶者疾無妄五損四豐二兊四無疾復彖有疾遁三鼎二貞疾豫五疾貞明夷三人正氣屬陽邪氣屬陰邪氣中人則為疾故凡彖爻之辭所謂疾者多是指隂柔而言豫五隂柔乘剛自為疾復諸隂皆將變為陽故曰無疾無妄九五以應六二之隂為疾遁九三以比六二之隂為疾明夷九三以六二之隂為疾兊九四以六三之隂為疾豐六二隂柔自得疾與豫六五同唯無妄之九五陽也為有餘之疾鼎之九二陽也為中滿之疾疾者人身不康寧也其占亦與厲害眚災不殊愠夬三有愠有愠者有喜之反也惕乾三惕若訟彖窒惕小畜四去惕出夬二惕號惕者敬勝怠也聖人作易教人懼以終始而危者使平乾之爻辭首及惕字莊敬日強唯陽剛能之彼隂柔則安肆日偷矣惡能惕乾九三夬九二之惕皆乾剛也訟之惕主爻九二也小畜之惕主爻六四變為剛而又上從九五之陽也戒比五邑人不誡泰四不戒以孚小過四必戒既濟四終日戒戒者知所警也比五戒字從言告戒之戒泰四戒字如郊祭戒百官鄉飲戒賔介之戒而亦兼有警戒之義焉不戒者不待戒之也小過之四既濟之四則専取警戒之義恤泰三晉五家人五夬二萃初勿恤凡五憂臨三既憂之豐彖勿憂疑豫四勿疑豐二得疑疾勿恤勿憂勿疑者占之教辭也事故不可以不憂然徒憂恤而不思所以處之則不可疑而不決則為之不果或至廢事問益五勿問問謂問筮勿問者言無煩問筮而其占固元吉也革九五之未占亦然言雖未占筮而其占已有孚也言需二訟初明夷初困彖震上漸初有言凡六師五執言夬四聞言革三革言震初笑言艮五言有序有言聞言人之言自外而至者如流言違言之類執言革言笑言言有序己之言自內而出者易纂言外翼卷五
