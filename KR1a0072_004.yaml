body:
  text: 易纂言外翼卷四元吳澄撰象例第七下龍乾初潛龍二見龍五飛龍上亢龍用九見羣龍坤上龍戰乾體皆為龍坤上變為陽亦乾之體也震為龍得乾之下畫也馬坤彖牝馬屯二四上乘馬班如賁四白馬翰如大畜三良馬逐晉彖康侯用錫馬蕃庶明夷二渙初用拯馬壯睽初喪馬中孚四馬匹亡乾震坎三陽卦皆有馬象坤為牝馬者乾六畫俱變而偶也乾為馬者性健而行不息也大畜九三良馬取乾象屯賁明夷渙兼取震坎象明夷渙皆以坎下畫之馬拯中畫之人前有震二隂為二馬與之同力故壯中孚取震象晉睽取坎象晉彖曰蕃庶者坤象也艮亦陽卦而不象馬者陽止于上而不行也牛無妄三或繫之牛大畜四童牛之牿離彖畜牝牛吉遁二執之用黃牛之革睽三其牛掣革初鞏用黃牛之革旅上喪牛于易既濟五東鄰殺牛坤為牛離為牝牛無妄大畜遁革四卦取坤象無妄大畜生牛也遁革死牛也無妄之四大畜之上遁之三若是偶畫則成坤革之初已變為柔若革之三是偶畫則亦成坤今無妄之牛人繫之於其前大畜之牛牿加於其首遁革之牛其皮去毛為革故於坤體三畫皆變其外一畫也革初九變為柔與遁同離睽旅既濟四卦取離象睽二三四互離旅離上既濟離下羊萈犬壯三上羝羊觸藩五喪羊于易夬四牽羊歸妹上士刲羊夬五萈陸夬夬兊為羊大壯夬歸妹皆有兊項氏曰萈音九山羊也豕大畜五豶豕之牙睽上見豕負塗姤初羸豕孚蹢躅坎為豕大畜上卦變坎中畫之剛為柔變坎外畫之柔為剛坎中有陽而去其陽豶其中也坎外無剛而益以剛牙其外也故曰豶豕之牙睽之三四五坎也初二三兊也坎居兊上豕在澤也上九臨之見其負泥塗也故曰見豕負塗姤之三若是偶畫則下卦為坎今三乃竒畫是坎豕變其外羸其形者也豕肥腯則肉豐而柔豕羸瘠則骨見而剛豕之外形雖變而其中與肉未變則雖孚而蹢躅者自若故曰羸豕孚蹢躅牲萃彖用大牲吉馬牛羊豕犬雞為六牲祭禮所常用者牛羊豕三牲也三牲並用曰太牢是為用大牲也萃卦下坤為牛上兊為羊三四五上肖坎為豕虎豹履彖三四履虎尾頤四虎視耽耽革五大人虎變革上君子豹變荀九家逸象以艮為虎先儒或以乾為虎皆非也虎者離象離於飛類為雉於走類為虎皆外有文明而中則隂質也履二三四互離頤六畫全體肖離革離在內卦九五離之應爻虎之文見乎外也上六亦離之應爻九五陽也上六隂也陽大隂小豹亦有文而小於虎故上六為豹狐解二田獲三狐未濟彖小狐汔濟坎為狐解未濟皆取坎象鼠晉四晉如鼫鼠艮為鼠禽師五田有禽比五失前禽恆四田無禽井初舊井無禽禽者飛類走類之通稱取坎象師卦坎在下五應二二為田故曰田有禽比卦坎在上坤三畫三驅之象坎在前縱其前去失前禽之象恆初二三四五雖有坎象然四與二非相應之位則田無禽矣井初居至下汚廢不治為舊井坎在上上而不下為禽不下飲于井之象鳥旅上鳥焚其巢小過彖飛鳥遺之音初飛鳥以凶上飛鳥離之凶鳥亦取坎象旅二三四五成坎小過六畫成復坎故彖傳曰有飛鳥之象焉隼解上公用射隼于髙墉之上上畫為天初二三坎也三四五又互坎兩坎相比鳥飛之迅疾者而上戾于天隼之象也鴻漸初鴻漸于干二鴻漸于磐三鴻漸于陸四鴻漸于木五鴻漸于陵上鴻漸于逵荀九家逸象巽為鸛今按鸛當作鴻鶴中孚二鳴鶴在隂逸象震為鵠今按鵠當作鶴雉鼎三雉膏旅五射雉離為雉中隂質而外文明也鼎九三變為柔成離翰音中孚上翰音登于天禮記曰雞曰翰音言有羽翰而能鳴也巽為雞一隂隨二陽雞之行首先動足次動而身隨之隂在後隨前二陽而動雞之象也龜頤初舍爾靈龜損五益二十朋之龜離為龜中柔者肉外剛者甲也頤之六畫損之二三四五上及益之初二三四五皆肖離貝震二億喪貝貝亦介蟲取離為象震之初二三四離也魚鮒剝五貫魚姤二包有魚四包無魚井二井谷射鮒巽為魚剝五變成巽巽下畫之隂與下卦隂畫相聨貫魚之象鮒小魚也井初巽下畫之隂為鮒井二之水下注而射之豚魚中孚彖豚魚吉豚魚江豚魚也中二隂魚之質外四陽形貌剛躁似豚澤將有風則出舟人謂此魚為風信故中孚取以為象唐人詩云江豚吹浪夜還風尾遁初遁尾既濟初未濟彖濡其尾初畫在後象獸之尾首明夷三明夷于南狩得其大首謂獸之大首者詩曰牂羊墳首陽為大三與上為應上為首牙大畜五豶豕之牙剛在外者牙也謂大畜之上九角大壯三羸其角晉上晉其角姤上姤其角大壯九三姤上九皆變為柔成兊羊之角也晉上九與坤上畫為應牛之角也革遁二革初黃牛之革革初九變為柔與遁下體皆坤而變其外一畫象牛而變其外之皮也翼羽明夷初垂其翼漸上其羽可用為儀小過象飛鳥初上象其飛之翼故明夷初畫象翼漸上畫象羽自龍馬牛至此象之取于動物者木困初臀困于株木漸四鴻漸于木或得其桷巽為木按字畫一在木下為本木之根也一在木上為末木之枝也一在木中為朱木之幹也後人假借為顔色之朱遂加木於旁以别木朱之朱困三四五互巽四當巽之中畫木之身也故為株木漸卦上巽屋椽之方者為桷木柯之橫卧而平者有似方椽故曰桷桑否五繫于苞桑楊大過二枯楊生稊杞姤五以把包瓜桑楊杞皆巽木否互巽而其下又有二隂象桑根之多也棘坎上置于叢棘坎中剛象棘身上下二偶象刺二坎相重為叢蒺藜困三據于蒺藜坎中剛象其實上下二偶象其刺果剝上碩果艮為果蓏上一陽為果中下二隂為蓏瓜姤五以杞包瓜艮中下二隂為蓏姤之初六即艮之下畫瓜也九二即艮之中畫變為陽象杞葉包初六之瓜在其內茅泰初否初拔茅茹大過初藉用白茅茅巽象下根白象巽下一隂上蒼象巽中上二陽泰初九變為柔成巽否三四五互巽初二與三皆茅之根莽同人三伏戎于莽莽者草之多震為敷為蕃鮮草之類皆象震同人九三變為柔成震葛藟困上困于葛藟困之三四五巽木也上六以柔而纒繫于木上葛藟也自木桑楊至此象之取於植物者簮豫四朋盍簮字書作簮即笄也笄以收髮故初喪被髮則去笄纚先儒謂豫九四一竒畫橫貫於五偶畫之中如笄之收髮一竒象笄五偶象髮六冕二辨皆用笄又非收髮之笄也帛賁五束帛戔戔坤為帛坤之上畫連束之於外也繻既濟四繻有衣袽繻繒帛也春秋時紀國有臣名裂繻字子帛漢制裂帛邊為符信曰繻終軍棄繻是也出入關門皆以傳傳欲速因裂繻頭合以為信衣既濟四衣袽乾如衣在裳之上猶乾位坤上也包裳之外猶乾包坤在內也既濟六四若是剛畫則三四五成乾體虞翻云袽敗衣也以繒帛為衣終有敝壞之時故曰繻有衣袽乾之中畫變為柔成離乾體虧損象衣之敗袂歸妹五其君之袂不如其娣之袂良袂衣袖也乾為衣一衣而二袂乾三竒變其外一竒為偶者袂之象下卦六三娣之袂也六五變竒則上六為女君之袂然因六五變而後成不如下卦六三之袂固有而自成也裳坤五黃裳坤為裳兩開不屬也帶訟上或錫之鞶帶鞶帶革帶也訟三四五互巽為股上畫連而繫於股之上鞶帶也紱困二朱紱方來五困于赤紱困之二三四互離三四五互巽離牛也巽股也以牛革蔽巽股而垂過股紱之象也履離初履錯然履形如舟納足於其中故履之字從舟而上乾下兌之卦為履卦中一畫虛有舟之象離中虛亦有舟之象焉他如坤履歸妹言履者履行之履皆虛字唯離初九爻辭為履舄之履是實字自簮帛繻至此象之取於服物者酒坎四尊酒未濟上有孚于飲酒食訟三食舊德泰三其孚于食剝上碩果不食大畜彖不家食明夷初三日不食井初井泥不食三井泄不食五井洌寒泉食鼎三雉膏不食需五需于酒食困二困于酒食漸二飲食衎衎坎為酒兊為食坎未濟言酒者有坎泰大畜言食者有兊需困漸言酒食者需困兼有坎兊漸有互坎六二變則成兊剝明夷無兊口井之初三鼎之三皆兊口在上故不食井五正當兊口之上故食德訟三食舊德恆三不恆其德五恆其德益五有孚惠我德得食於人曰德言恩惠所及也詩曰既飽以德凡曰德者皆有巽風之施命及下又兊口之反也兊口向上食於人者也反兊口於下食人者也羞否三包羞恆三或承之羞俎所薦為正饌豆所羞為加饌羞者牛臛羊臛牛炙羊炙牛胾羊胾之類雖美味而非牲體之正饌三非中位否三坤牛之上體恆三兊羊之下體故為羞脀否二包承承脀古字通用而讀者誤其音釋者誤其義脀牲之正體否六二變為剛得坎中畫豕之正體也血􅀢坤上龍戰于野其血玄黃屯上泣血漣如需四需于血小畜四血去惕出歸妹上士刲羊無血渙上渙其血去逖出泰二包􅀢坎為血卦屯上六坎上畫需六四坎下畫皆血象小畜渙四五皆得坎半體坎體不全故雖有血皆去之而出小畜六四猶在坎半體之內則雖出而猶惕渙上九已在坎半體之外則出而相逺者也坤歸妹上六所言龍之血陽之血也不取坎象􅀢亦血也泰九二變為柔得坎下畫故為􅀢左傳引歸妹之辭云士刲羊亦無􅀢也膏屯五屯其膏鼎三雉膏不食考工記天下之大獸五脂者膏者脂謂牛羊膏謂犬豕屯九五坎之中畫豕之膏也鼎九三變為柔得離之中畫雉之膏也膚噬嗑二噬膚滅鼻睽五厥宗噬膚膚豕體之在外而柔者禮有膚鼎噬嗑六二互坎下畫之下睽六五互坎上畫皆豕體之在外者故為膚肉胏噬嗑三噬臘肉五噬乾肉四噬乾胏噬嗑三四五互坎故皆取豕肉之象上卦離為日臘肉肉之日乾而久者也六三在離日之下故為臘肉離為乾卦四五皆離體故為乾三五皆柔故為肉胏肉之連骨者也四剛故為胏自酒食德至此象之取於食物者鼎初畫偶象鼎足二三四象鼎腹實牲體五偶象耳上竒象鉉匕鬯震彖不喪匕鬯震為匕坎為鬯簋坎四尊酒簋二用缶損彖曷之用二簋坎二三損二三四象簋坎四五損五上象其蓋尊坎四尊酒坎二三四象尊初象其足缶比初盈缶終來坎四用缶離三鼓缶缶亦坎之象所受多於尊爾雅小罍謂之坎比坎五上離三四五象缶瓶􅀢井彖羸其瓶二􅀢敝漏井之二三瓶􅀢實水之象初畫偶在下故為瓶羸􅀢漏之象筐歸妹上女承筐無實震下竒中上偶有筐之象牀剝初剝牀以足二剝牀以辨四剝牀以膚巽二上巽在牀下下偶承竒牀之象機渙二渙奔其機初偶二竒機之象車大有二大車以載賁初舍車而徒睽上載鬼一車困四困于金車坤為大輿大有之下卦乾也以坤之大輿而實其中以載也坎為輪為輿賁睽困皆以坎為車輿小畜三大畜二輿説輹剝上君子得輿大畜三日間輿衛大壯四壯于大輿之輹睽三見輿曵剝上九一陽在坤大輿之上故曰君子得輿大畜九三變為柔大壯九四變為柔皆成坤之大輿睽三四五互坎為輿而九二曵之於後輹小畜三大畜二大壯四案此條不載經文與輿字相連故從省文謹校輹者伏兔輹在輿下加于軸上以承輿者也坤為輿則其下畫為輿之輹大畜九三當坤之下畫小畜九三變為柔九二當坤之下畫而二爻皆不變則坤無下畫矣是輿而説去其輹也輪既濟初未濟二曵其輪坎為輪其於輿也為曵既濟二三四互坎而初九曵之未濟與睽三四五互坎而九二曵之故曰曵其輪柅姤初繫于金柅九三當坎之前一畫連而不偶柅其輪也茀既濟二婦喪其茀茀者車後之蔽也既濟之二三四互坎為輿六二當坎之後一畫如車蔽然然九二變為柔則失坎之後一畫如車之喪其茀也弧睽上先張之弧後説之弧坎為弧象睽三四五互坎矢噬嗑四得金矢解二得黃矢旅五一矢亡離為矢象噬嗑旅上卦離解二三四互離斧旅四得其資斧巽上喪其資斧巽木貫離兵為斧律師初師出以律否臧律截竹為管或鑄銅為管以候氣定聲也逸象曰坎為律上下空而陽氣行乎其中也圭益三中行告公用圭逸象震為玉今按當作圭玉鼎上鼎玉鉉乾為玉乾剛健中正純粹精也鼎上九畫陽位隂剛柔適中故為玉金蒙三金夫噬嗑四金矢五黃金姤初金柅困四金車鼎五金鉉乾為金凡諸卦之爻辭言金者皆剛畫也蒙之金夫九二也噬嗑之金矢九四也黃金六五變為剛也姤之金柅九三也困之金車九四也鼎之金鉉上九也資旅二懷其資四得其資斧巽上喪其資斧巽為近利市三倍其下畫之柔者為資載小畜上尚得載大有二大車以載載者車舟所載之物才再切詩所謂輸爾載書所謂臭厥載是也今讀易讀書者誤讀為再易辭唯睽上載鬼一車是音再坎為輿坎之上畫虛小畜之上其畫實以物載坎輿之上而實之也坤為大輿三畫皆虛大有下卦乾體三畫皆實是有載物實大輿之中也囊坤四括囊坤為囊柔而虛可容物也六四變為竒畫在下坤之上括結囊口也包蒙二包蒙泰二包􅀢否二包脀三包羞姤二包有魚四包無魚五以把包瓜禹貢言厥包謂貢物不可露致者包裹之禮記言以包苴簞笥問人包謂包裹魚肉以遺人也􅀢脀羞魚瓜皆食物之可包裹者凡爻辭言包者皆謂在外之陽畫泰九二變為柔􅀢也而九三之陽包之於外否六二之柔脀也而九五之陽包之於外否六三之柔羞也而九四之陽包之於外姤之魚與瓜皆指初九之柔而言初與四為正應九四不能包其魚而為近比之九二所包初與五非比應九五不自包其瓜而以應位之九二包之蒙則以九二之陽包初六隂柔之蒙者也坰井上井收勿坰坰亦作􅣃以巾覆物也井上六偶畫開而不蔽勿坰之象蔀豐二四豐其蔀上蔀其家蔀以草為障蔽之具也豐九四一畫障蔽於六五之下蔀之象也斾豐三豐其斾今本作沛陸氏曰本或作斾幡幔也九四象蔀九三又以竒畫重障蔽其下有如幡幔也桎梏校蒙初用説桎梏以往噬嗑初屨校滅趾上何校滅耳桎足械梏首械蒙之二三四互震震足也震足在桎之外初為桎初桎在足之下偶畫分而不合足以説桎之象蒙之下卦坎坎耳也四為梏坎耳在梏之下四梏在耳之外偶畫分而不合首已説梏之象校即桎梏也橫木為械在足曰桎在首曰梏皆謂之校噬嗑初上二竒畫如木之連亘不開校之象也初為足之趾足校在脛不當趾也今校其足而校木之厚前過其趾趾為校所遮掩而不見故曰滅趾首校在項不當耳也今校其首而校木之厚上及其耳耳為校所遮掩而不見故曰滅耳徽纆繫維坎上繫用徽纆隨二繫小子三繫丈夫上拘繫之無妄三或繫之牛遁三繫遁姤初繫于金柅隨上乃從維之坎彖維心晉上維用伐邑解五君子維有解徽纆繩索之約物束物者以縶罪人即論語所謂縲絏也徽纆繫維皆以坎取象坎上下二柔畫如徽纆之柔而繫纆維絡乎中之一剛畫也自鼎匕鬯至此象之取于用物者章坤三姤五含章豐五來章發生萬物粲然有章者陽之為也然非隂成之則不可坤以隂含藏陽氣於內有衣錦尚絅暗然日章之美坤六三變為陽四含之於外姤九五變為隂含三陽於內故曰含章豐六五下來求九四之章故曰來章玄坤上其血玄黃黑蒼之色為玄玄天之色也上天之位也黃坤五黃裳上玄黃噬嗑五黃金離二黃離遁二革初黃牛解二黃矢鼎五黃耳黃中央之色凡言黃者皆二五也黃地之色也故坤上六亦曰黃朱困二朱紱赤黃之色為朱赤困五赤紱赤南方之色坎為赤隂陽互藏其宅也朱赤皆自坎取象白賁四白馬上白賁大過初白茅白西方之色巽為白兊亦為白巽兊同體也賁二三四互坎三四五互震馬也六四變為剛成巽白也故曰白馬泰上六下二文剛九二上上文柔而成賁文極反質賁復為泰則二三四成兊得西方之白上與兊之中畫應故曰白賁凡八卦之色乾坎赤坤離黑震艮蒼巽兊白東坤彖蹇彖東北既濟五東鄰西坤彖蹇彖解彖西南小畜彖小過五西郊隨上西山既濟五西鄰南坤彖蹇彖解彖見上明夷三南狩升彖南征北坤彖蹇彖見上以八卦之方而論離南也坎北也震東也兌西也乾西北也坤西南也艮東北也巽東南也以六畫之位而論初東三南四西上北二五中也初東者陽之稚也三南者陽之極也四西者隂之稚也上北者隂之極也麻衣易以五為南二為北三為東非也凡彖辭爻辭所謂東西南北惟隨上六西山是專取兌象小畜小過之西郊指主爻之四而兼取兌方其餘皆是取卦畫之位坤西南得朋謂三四相比近為得朋乃得與其類同行也東北喪朋謂初上相隔逺為喪朋乃終有慶者至上則終也蹇利西南往得中也謂因震初往五得上卦之中故震四來三而三四得以相往來於西南也不利東北其道窮也謂上乃上卦之窮處初乃下卦之窮處也解利西南往得衆也謂三往四則上卦成坤坤為衆得衆也其來復吉乃得中也謂三若來復於二則得下卦之中也明夷以臨二往三為南狩升以臨初往三為南征也南亦指三而言既濟東鄰謂二二比於初東之鄰也下卦離為牛故曰殺牛西鄰為五五比於四西之鄰也左師四左次明夷二左股四左腹震為左師二三四互震明夷三四五互震右豐三右肱兌為右豐三四五互兌上解上髙墉之上小過彖不宜上艮為上解自艮而變上與二易三與四易小過下卦艮下巽二上牀下小過彖宜下巽為下小過二三四互巽下為巽之下畫六二也上謂艮之上畫九三也內比二比之自內外比四外比之凡畫卦自下而上在下者為內在上者為外前夬初壯于前趾前者位之在前也先者時之在先也先坤彖先迷否上先否同人五先號咷睽上先張之弧旅上先笑後坤彖後得主否上後喜同人五後笑明夷上後入于地睽上後説之弧震初後笑言啞啞旅上後號咷上中下內外以位言先後初中終以時言凡彖爻之辭曰中者因位之中為時之中也初明夷上初登于天睽三無初既濟彖初吉中訟彖師二中吉泰二復四益三四夬五中行終坤三謙彖三睽三困四有終需二上訟初三履四蠱初賁五家人上鼎三終吉坎四終無咎比初盈缶終來訟彖終凶夬上終有凶復上終有大敗家人三終吝既濟彖終亂萃初不終以三畫卦言初四為初二五為中三上為終以六畫卦言初二為初三四為中五上為終甲蠱彖先甲三日後甲三日庚巽五先庚三日後庚三日治蠱自內卦之初始主爻初六東甲也故數日用甲重巽申命自外卦之下始主爻六四西庚也故數日用庚生明之月震也昏見庚故震納庚上弦之月兌也昏見丁故兌納丁望之月乾也昏見甲故乾納甲生魄之月巽也旦沒辛故巽納辛下弦之月艮也旦沒丙故艮納丙晦之月坤也旦在乙故坤納乙坎為月戊者月之體望日午時月在壬與日相正對故坎納戊又納壬離為日己者日之體朔日子時月在癸與日合為一故離納己又納癸蠱下巽納辛先甲三日也二三四互兌納丁後甲三日也巽二三四互兌納丁先庚三日也三四五互離納癸後庚三日也已革彖革二革下卦離中畫六二為主爻離納已故曰已日大大有大畜大過大壯屯五大貞泰彖大來否彖大往同人五大師豫四大有得家人四萃四升初小過彖大吉凡曰大者皆謂陽也蠱三姤三之無大咎復上之大敗明夷三之大首亦是言陽惟大有二之大車大壯四之大輿自坤取象小小畜小過屯五小貞需二訟初小有言泰彖小往否彖小來蠱三小有悔噬嗑三小吝賁彖小利有攸往遁彖小利貞萃三小吝旅彖巽彖小亨既濟彖亨小凡曰小者皆謂隂也一睽上一車損三一人萃初一握旅五一矢凡一者艮與坎也損卦艮上萃二三四互艮睽旅皆三四五互坎按旅二三四五成四畫之坎原本誤二損彖二簋凡二者離與兌也損卦兌下三需上損三三人訟二三百戶上三褫之師二三錫命比五三驅晉彖三接解二三狐革三三就巽四三品同人三坎上困初豐上三嵗既濟三未濟四三年蠱彖明夷初巽五三日凡三者坎與震也坎既濟未濟皆坎也需比坎上訟師解困坎下晉三四五互坎巽初二三四肖坎同人革九三變為柔成震蠱明夷三四五互震七復彖七日來復震二既濟二七日得凡七者震與乾也震復皆震也既濟六二變柔為剛成乾八臨彖至于八月有凶凡八者兌與坤也臨兌下坤上九震二躋于九陵凡九者艮也震二三四互艮十屯二復上頥三十年損五益二十朋凡十者坤也復卦坤上屯益二三四互坤頤二三四及三四五皆互坤邵子曰有意象有言象有象象有數象一數屬艮坎二數屬離兌三數屬坎震四數屬巽離五數屬乾六數屬巽七數屬震乾八數屬兌坤九數屬艮十數屬坤每卦之數各兩艮九一坎一三震三七乾七五巽六四離四二兌二八坤八十而彖爻之辭無四數五數六數橫圖陽順布基於一稚於三中於五劇於七究於九隂逆布基於四稚於二中於十劇於八究於六五十數之中九六數之究故專屬一卦其餘數皆分屬兩卦從圖陽順行自左一而上踰七趨右而究於九始二少次二仲二長復終於二少隂逆行自右四而上踰八趨左而究於六始二長次二仲二少復終於二長方圖如橫圖陽右隂左中五左中十右者互藏其宅也圓圖如從圖陽左隂右乾天氣也震雷巽風皆天之氣故上附於天離坎在天為日月象也象者氣之已著故上附雷風之氣坤地形也兌澤艮山皆地之形故下附於地坎離在地為水火質也質者形之未凝故下附澤山之形天與雷風之氣在上地與澤山之形在下坎離之象之質介乎氣形之間故在中地形之重濁者山自左而升以漸融釋為水之質為月之象為雷之氣至上則輕清之極為天天氣之輕清者風自右而降以漸顯見為日之氣為火之質為澤之形至下則重濁之極為地此圓圖之順行者也陽氣自左降則起中五而究於九隂形自右升則起中十而究於六此圓圖之逆行者也一數析為四分十數凡四十分每卦占五分乾得五之全七之少震得七之太三之半坎得三之半一之太艮得一之少九之全坤得十之全八之少兌得八之太二之半離得二之半四之太巽得四之少六之全百訟二三百戶震彖百里百者十其十亦取坤數訟九二變為柔成坤震以乾之下一陽易坤之下畫主坤之邑國諸侯之象其地方百里也自章玄黃至此象之取於采色方位時日名數者按自卦數之圖至此詳考文義卦數之圖正發明邵子十數之義百及訟二震彖云云正與十為類自章玄黃云云則總結章及坤三姤五以下之文也原本不標象例之目又誤分于二卷中疑不相蒙恭核正易纂言外翼卷四
