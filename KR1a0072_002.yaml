body:
  text: 易纂言外翼卷二元吳澄撰象例第七上天乾五飛龍在天大有上自天祐之大畜上何天之衢明夷上初登于天姤五有隕自天中孚上翰音登于天卦象乾為天卦位五上爲天凡以天爲象者皆五上之位陽剛之畫也明夷以反體言所謂天者指晉之上九亦剛畫也以應位言指九三亦剛畫也日乾三終日乾乾豫二不終日既濟四終日戒蠱彖巽五三日震二既濟二七日大畜三日閑輿衞革彖二已日離三日􅉴晉彖晝日豐彖三四日中訟上終朝解彖夙乾三夕夬二暮夜豐初旬卦象離為日乾九三變爲柔豫六二變爲剛則二三四成離夬九二變為柔則初二三成離訟解巽皆有互離既濟下體有離又三四五互離震初二三四蠱大畜三四五上皆成四畫之離卦位五爲天上爲天之上三為人四為人之上二為地初為地之下故上之位為朝日上天之時訟上言朝明夷上言初登于天是也解彖言夙指上六言也五之位為晝日中天之時晉離在上體離中畫當五之位故彖言晝日指五而言也豐離在下體與明夷同二當下卦之中日當天中其影在地故亦曰日中葢五為日中震一畫障蔽于五之下故日中而黑暗如明夷日入地之時也豐三四言日中者皆指六二而言也或謂三四在六畫卦之中故亦曰日中者非也四為人之頭上日過中之時三為人所居之處下近於地為日昃將夕之時故既濟四乾三皆言終日葢自日過中至將夕為終此一日乾三言夕離三言日昃是也二之位為暮夜日入地之時故夬二言暮夜豫二言不終日豫之三四五互坎為石二近三四介于坎之石不居四不居三而居二故曰不終日晝者日中午午前禺中已午後昳昃未晨者早食辰亦曰早晡者晚食申亦曰晚朝者日出卯亦曰夙夕者日入酉亦曰暮旦者平旦寅昏者黄昏戌子前人定亥子後鷄鳴丑夜者夜半子初寅丑二子亥豫曰不終日夬曰暮夜三戌酉乾曰終日離曰日昃四申未既濟曰終日五午巳晉曰晝日豐曰日中上辰卯訟曰終朝解曰夙十日自甲至戊爲半已者後五日之始改革之時也離納已故革言已日旬十日也豐初納離已卯二納離己丑己卯至己丑過一旬故豐初言旬月小畜上歸妹五中孚四月幾望臨彖八月卦象坎為月納甲震為生明之月兌為上弦之月乾為望之月巽為既望之月艮爲下弦之月坤為晦之月㡬望之㡬孟荀一行作既㡬字亦有既音左氏傳庸可㡬乎日月以㡬是也京作䢋晁氏曰䢋讀為既詩徃䢋王舅是也澄按此㡬當作既月既望巽之象參同契曰十六轉受統巽辛見平明小畜中孚上體巽歸妹五變成巽日常盈月常虧月既望則盈而與日敵小畜歸妹中孚皆隂為主之卦隂盛得時故以月既望為象卦氣復為一陽之月臨為二陽之月姤為一隂之月遯為二隂之月自復一陽厯八月至遯二隂與臨正對斗豐二四日中見斗北斗七星在中宫星之最大者豐上體震如仰盂有斗象沬豐三日中見沬沬斗杓下小星也震有斗象三在震下象沬雨雲小畜彖不雨上既雨睽上徃遇雨夬三獨行遇雨鼎三方雨小過五不雨小畜彖小過五宻雲卦象坎為水為雲為雨小畜二三四互兊小過三四五互兌兌變坎下畫水壅塞而不流雲宻蔽而不雨之象小畜上變則成坎故云既雨睽三四五互坎夬三五鼎九三變為柔則三四五亦成坎故云遇雨方雨也霜坤初履霜霜者露之所結露者土氣所為自下而上地上有陽則坤土之氣為露能滋養萬物及九月五隂陽消將盡則露凝為霜氷坤初堅氷至氷者水遇盛隂之氣而凝其堅如石也十月始氷十一月以後則氷堅矣坤六畫純隂為十月之卦霜凝於坤體將成之時氷堅於坤體既成之後聖人於坤初言隂氣漸長之可畏故履霜而知堅氷之必至當其未成坤也在上一陽未盡滅已不能敵隂而霜始凝及其既成坤也在下一陽雖已生亦未能勝隂而氷益堅其示戒之意深矣自天日月至此象之取於天者地明夷上後入于地卦象坤為地爻位初二為地四亦為地明夷坤地在上離日在下日入于地之下也田乾二見龍在田師五田有禽恒四田无禽解二田獲三狐巽四田獲三品田地上也乾解以二為田恒巽以四為田師五與二應亦以二為田淵乾四或躍在淵淵在地下龍之所潜謂初也詩曰魚潛在淵又言或潛在淵言其在淵而潛也詩曰魚躍于淵此言或躍在淵言其在淵而躍也謂本是在淵今自淵而躍出非謂素不在淵方自他處而躍入也龍一躍則向乎天矣豈復在乎淵也哉四之位與初應故言自初所潛處而躍出以至于四四近乎天而非淵也漢上朱氏曰四變成兌兌為澤淵也朱子以四之位高出人上逼近乎天遂釋淵為上空下洞深昩不測之所程子所謂淵者龍之所安在淵者在所安爾淵字但為設譬則與田字天字不一例而在字與在田在天之在亦不同三家說皆不通者盖泥於四為淵而不以初為淵故也川需彖同人彖蠱彖大畜彖頥上益彖渙彖中孚彖未濟三利渉大川凡九謙初用渉大川吉訟彖不利渉大川頥五不可渉大川繫辭傳刳木為舟剡木為楫舟楫之利以濟不通盖取諸渙以渙二三四五有舟象也中孚之象與渙之象同故彖傳曰乗木舟虚益之初二三四五頥之初二三四五上大畜蠱之三四五上皆有舟象需三四五互離訟二三四互離同人下體離謙初六變為剛成離未濟二三四互離又上體有離亦皆舟之象也凡渉大川舟之進而前者利舟之退而後者不利以需訟同人蠱大畜益渙中孚八卦觀之需蠱大畜益渙中孚之舟皆進而前者也唯訟同人之舟在後然同人離火應乎乾而上同故進而利訟坎水違乎乾而下行故退而不利謙之舟亦在後然初變柔為剛剛能上進變則有應在前故君子陽剛之人用之以渉則吉用謂動而進也若非陽剛又不動進則不吉矣頤自坎變二與上相易剛進前柔退後故上利渉五與初相易剛退後柔進前故五不可渉未濟六三之象與訟之下體同然九二為訟之主而無應則無挽之於前者矣未濟六三有陽剛之應在上又上體之離象舟後舟與前舟二舟相繼而進非如訟之不前進而退入于淵也故未濟利而訟不利蔡氏則曰未濟六三爻辭利上疑脫不字河泰二用馮河馮謂徒渉河流水之大者泰九二變為柔二三四互坎為水三四五互震為足不用舟而徒渉之象谷困初入于幽谷井二井谷水之下注者谷也困初坎下畫為谷初地之下為幽井之二三四互兊水􅀢為澤之象九二變為柔則兊下畫變坎下畫如水之通其下流而不壅塞有井水不上出而下注之象故曰井谷井井卦初二三四成四畫之坎水在井中之象上體坎水在巽木之上汲水上出井口之象泉井五寒泉食泉水之初出也坎之中畫象泉出地中井之九五則象汲泉上至井口泥塗井初井泥需三需于泥震四震遂泥睽上見豕負塗坎之中一剛畫為水上下二柔畫為水旁之土水濕其土而軟則成泥故凡言泥者皆坎之下畫井初四畫坎之下畫也需三變為柔與上卦坎之下畫連接需待于瀕水之泥也震四之剛畫卦主為雷聲其聲不能上驚六五而但下驚六三六三互坎之下畫也遂沈抑于泥者也塗亦泥也禹貢荆揚二州厥土塗泥暌上與三正應三為互坎之下畫坎豕之負泥塗者也沙需二需于沙沙小石在水旁水透入其中剛畫石也隂位小也與坎之中畫應中有水也石豫二介于石困三困于石說卦傳艮為小石艮之剛在坤地之上山頂之小石也坎之剛在坤地之中土中之大石也說易者皆知艮為石而不知坎之為石盖不能舉隅而反爾艮小石也坎石也凡單言石者皆坎象介猶介蟲介胄賔介之介疆介之義亦同後人加田字以别之豫三四五互坎石也二近接其疆境故曰介于石困六三坎之上畫在石之上故曰困于石磐屯初磐桓漸二鴻漸于磐漸六二互坎下畫而變剛水中大石近岸者也屯初九應坎下畫以剛而居互坤之下猶磐石桓木之在地中牢固不可動也干漸初鴻漸于干干水厓也二三四互坎為水初與之近猶水之厓山隨上西山升四岐山西山岐山皆指地名非象山也故不就艮取象二山皆在正西故就兊取象林屯三唯入于林中平地有竹木曰林屯二三四互坤坤平地也前有艮木後有震竹故曰林坤之中畫故曰中鹿屯三即鹿陸氏曰王肅作麓晁氏曰鹿古文鹿山足也屯三四五互艮為山三艮之下畫山之足也丘賁五賁于丘園頥二拂經于丘頥渙四渙有丘丘之髙得山之半故艮之中畫為丘賁六五渙六四皆艮之中畫頥六五艮中畫也二與五之位相應拂者上摩之義六二仰拂以求養于上九必經過六五之丘故曰拂經于丘頥經如陶淵明所云崎嶇而經丘之經陵同人三升其高陵震三躋于九陵漸五鴻漸于陵陵取象與丘同同人九三漸九五變為柔皆得艮中畫震六三亦互艮中畫自震六二躋于六三也陸夬五莧陸夬夬漸三鴻漸于陸陸者高平廣大可以通行之地夬九五變為柔成震為大塗漸九三變為柔成坤為平地夬之五爻皆變唯五不變為觀之夬則亦下履坤之平地漸之五爻皆變唯三不變為大壯之漸則亦前向震之大塗故皆取陸象道小畜初復自道履二履道坦坦隨四在道以明復彖反復其道爾雅曰一達謂之道路之一達而無他岐者也震為大塗小畜五畫俱變唯初不變有復卦下體之震故曰復自道履九二變為隂則下體成震故曰履道隨之四履下卦大塗之上故曰在道復之一陽反于下為震復于其道也震之大塗平廣之正路也艮之徑路狹小之山蹊也行泰二復四益三四夬五中行无妄三行人上行有眚明夷初君子于行震三行无眚艮彖行其庭行道也詩言周行景行是也震為大塗泰復无妄明夷益夬艮皆有震謙豫言行師亦是有震衢逵大畜上何天之衢漸上鴻漸于陸衢路之四逹者天之衢謂雲霄中之路也上之位為天上九變為柔則成坤天上猶平地故曰天之衢何與噬嗑何校之何同詩曰何天之休漢王延夀魯靈光殿賦云荷天衢以元亨何作荷謂以首戴之也上為首荷天之衢猶莊子言背負青天也逵聲與衢通漸上鴻漸于陸胡氏曰此卦以鴻漸為象初漸于干二漸于磐三漸于陸四漸于木五漸于陵至上復言陸疏說謂上九九三皆處一卦之上故皆言陸陸者髙頂也徧觀無高頂曰陸陸地之高平者陵大阜也安有地而反髙於山阜哉陸氏言高過即反下故上九處極高之地反為陸也按漸卦自下而漸于上自微而至於高大陵未為極高之地豈有反下之義考經文陸當為逵盖字體相類而誤逵者雲路也言鴻之飛高至於雲路程子從之朱子曰以韻讀之良是澄按三先生所見審矣但據爾雅路之九逹者曰逵杜氏謂路容九軌者曰逵未聞釋逵為雲路者易大壯五喪羊于易旅上喪牛于易易陸績作埸疆埸也晁氏曰易乃古文疆埸字大壯旅皆以上畫為易在外境窮盡之處故曰易野坤上龍戰于野同人彖同人于野地與天際者曰野古詩云天似穹廬籠四野坤為地五與上為天乾為天二與初為地坤下體坤地上接五與上同人上體乾天下接二與初故曰野郊需初需于郊同人上同人于郊小畜彖小過五自我西郊國門之外曰郊以六畫卦言二三四五為國中初上為郊小畜小過之西郊皆謂四以二體言内卦為國中四在内卦之外為郊四為西方又互兊兊正西也四為兊之上畫在正西之位故曰西郊國師上開國謙上邑國觀四觀國之光復上國君益四遷國未濟四大國坤為國邑師謙觀復皆有坤益二三四互坤未濟四變為柔成坤邑謙上邑國訟二比五无妄三邑人泰上自邑告命晉上伐邑夬彖告自邑升三虚邑井彖改邑比泰謙晉升有坤訟二變為柔成坤无妄三坤上畫人位為邑人初震動大塗為行人夬自坤變坤下五畫已皆變為剛僅存坤上一畫未變邑削衆散故告自邑不利即戎井五泰之初徃五改坤為坎改其邑也城隍泰上城復于隍掘地為隍取其土以築城故城髙而隍深乾畫連亘城之象坤畫斷闕隍之象今坤在上是高起者變為平地矣乾在下其畫實是城土下復而實其隍矣墉同人四乗其墉解上高墉之上離有垣墉之象同人四在離上為乗墉解二三四互離四為公當離之上畫立于高墉之上也藩大壯三上羝羊觸藩四藩决不羸當羊所觸者為藩四當三之前竒畫連象藩五當四之前偶畫斷象藩决上偶畫當五之前變為竒亦為藩巷睽二遇主于巷五離之中虚處為巷穴坎窞需四出自穴上入于穴小過五公弋取彼在穴坎初三入于坎窞坎之偶畫在内者為穴小過復坎也坎窞與穴同義廟萃彖渙彖王假有廟艮為廟萃二三四互艮渙三四五互艮家蒙二子克家師上開國承家大畜彖不家食家人初三四五損上得臣无家豐上蔀其家離外有垣墉中虚可居家之象蒙二三四五上成離師上變為剛則二三四五上成離二三四互震為諸侯有坤土開國也又為長子居内之中承家也大畜三四五上成離二三四互兊兊口在外不食於内以外為家者也家人内離為在下之家三四五互離為在上之家損二三四五上成離上最在外是得臣於外上變則不成離故曰无家豐上變則五為離中畫家也震之剛畫在其下蔀蔽之按家人初三四五爻辭原本未載謹仍其舊宫剥五以宫人寵困三入于其宫剥之宫有國者之宫也坤為國一剛畫在外宫之墻也五隂在内宫中之人也困之宫有家者之宫也二三四互離為家門同人初同人于門隨初出門交有功明夷四獲明夷之心于出門庭節二不出門庭艮為門闕同人初變為柔成艮隨初節二出則及門矣明夷三四五艮之倒體户訟二其邑人三百户豐上窺其户節初不出户庭艮為門者二偶畫為出入之所户門之半也故一畫之偶為户豐之户五也節初變為柔為户庶人之家有户無門故計民數以一家為一户訟二變為柔為坤三偶畫皆為户坤之數十十十為百三畫之偶三百户也牖坎四納約自牖凡室東户西牖四為西偶畫虚而通明牖之象也棟大過彖三棟橈四棟隆棟者屋之脊檩也大壯象宫室之上棟下宇四剛象自下承上之棟二柔象自上覆下之宇故大過三四二剛畫亦象棟屋豐上豐其屋大壯象宫室以中二剛畫象棟前二柔畫象宇豐之三四五上如之屋之象也凡剛變而柔為减損而小之柔變而剛為増益而大之豐上柔變為剛是増大其屋也廬剥上君子剥廬艮有廬象艮之上畫竒變而偶則上無葢覆矣是剥其廬也庭明夷四出門庭夬彖揚于王庭艮彖行其庭節初不出户庭二不出門庭艮為門有門外之庭有門内之庭明夷四艮倒體之外畫艮上艮正體之外畫二者皆門外之庭也節三四五互艮三艮體之内畫門内之庭也二近三而不即三故曰不出門庭節初變為柔為户二在初之外户外之庭也初不即二故曰不出户庭夬五王之居也上在王居之外故為王之庭背艮彖艮其背背北堂也詩曰焉得諼草言樹之背艮二三四五象堂初在堂之後象背上在堂之前象庭背與庭爲對皆就宫室取象因爻辭五句皆就人身取象故讀者誤從爻辭之例解作人身之背其義迂回不通且與下句其庭非一類階升五升階地勢有髙卑坤土三畫自下而上階之象也次師四師左次旅二旅即次三旅焚其次次謂權暫止息之地非常居之地也故軍師之所宿行旅之所舎皆曰次左傳師一宿為宿再宿為信過信為次旅以應位為次六二者六五之次上九者九三之次自地田淵至此象之取於地者易纂言外翼卷二
