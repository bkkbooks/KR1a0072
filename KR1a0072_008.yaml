收閉之清濁聲以乾兊離震四卦自乘而不乘坤艮坎巽音以坤艮坎巽四卦自乘而不乘乾兊離震其用者三十二卦不用者三十二卦十六數八數四數二數生生生長生收生藏長生長長長收長藏收生收長收收收藏藏生藏長藏收藏藏皇皇皇帝皇王皇霸帝皇帝帝帝王帝霸王皇王帝王王王霸霸皇霸帝霸王霸霸士士士農士工士商農士農農農工農商工士工農工工工商商士商農商工商商飛飛飛走飛木飛草走飛走走走木走草木飛木走木木木草草飛草走草木草草聖人作易初畫為兩儀一加為四象再加為八卦三加為十六四加為三十二五加至六十四而數備矣邵子之書數必以四四又乘四則為十六如時之為生長收藏君之為皇帝王霸民之為士農工商物之為飛走木草凡事皆然此類不一蓋與易三加為十六之數同也乾太陽日暑性目兊太陰月寒情耳離少陽星晝形鼻震少陰辰夜體口巽少剛石雷木氣坎少柔土露草味艮太剛火風飛色坤太柔水雨走聲凡若此類蓋與易再加為八卦之數同也春易道化仁聖夏書德教禮賢秋詩功勸義才冬春秋力率智術凡若此類蓋與易一加為四象之數同也天動變感用心地靜化應體迹凡若此類蓋與易初畫為兩儀之數同也坤太柔由動靜而為陽隂剛柔易之兩儀生四象也由陽陰剛柔而為太陽太隂少陽少隂少剛少柔太剛太柔易之四象生八卦也易纂言外翼卷八
