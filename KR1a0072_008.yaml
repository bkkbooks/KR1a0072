  text: 易纂言外翼卷八元吳澄撰易流第十二案易流標目原本脫去謹據小序校補又案序文述易流係皇極經世太元潛虛九疇數四種今惟存邵子書謹識邵子皇極經世書元會運世嵗月日辰之數乾之乾一元之元一乾之兊十二元之會十二乾之離三百六十元之運三百六十乾之震四千三百二十元之世四千三百二十乾之巽十二萬九千六百元之嵗十二萬九千六百乾之坎一百五十五萬五千二百元之月一百五十五萬五千二百乾之艮四千六百六十五萬六千元之日四千六百六十五萬六千乾之坤五億五千九百八十七萬二千元之辰五億五千九百八十七萬二千兊之乾一百六十七億九千六百一十六萬會之元十二兊之兊二千一十五億五千三百九十二萬會之會一百四十四兊之離六萬四百六十六億一千七百六十萬會之運四千三百二十兊之震七十二萬五千五百九十四億一千一百二十萬會之世五萬一千八百四十兊之巽二千一百七十六萬七千八百二十三億三千六百萬會之嵗一百一十五萬五千二百兊之坎二兆六千一百二十一萬三千八百八十億三千二百萬會之月一千八百六十六萬二千四百兊之艮七十八兆三千六百四十一萬六千四百九億六千萬會之日五億五千九百八十七萬二千兊之坤九百四十兆三千六百九十九萬六千九百一十五億二千萬會之辰六十七億一千八百四十六萬四千離之乾二萬八千二百一十一兆九百九十萬七千四百五十六億運之元三百六十離之兊三十三萬八千五百三十三兆一千八百八十八萬九千四百七十二億運之會四千三百二十離之離一千一十五萬五千九百九十五兆六千六百六十八萬四千一百六十億運之運十二萬九千六百離之震一京二千一百八十七萬一千九百四十八兆二十萬九千九百二十億運之世一百五十五萬五千二百離之巽三十六京五千六百一十五萬八千四百四十兆六百二十九萬七千六百億運之嵗四千六百六十五萬六千離之坎四百三十八京七千三百九十萬一千二百八十兆七千五百五十七萬一千二百億運之月五億五千九百八十七萬二千離之艮一萬三千一百六十二京一千七百三萬八千四百二十二兆六千七百一十三萬六千億運之日一百六十七億九千六百一十六萬離之坤一十五萬七千九百四十六京四百四十六萬一千七十二兆五百六十三萬二千億運之辰二千一十五億五千三百九十二萬震之乾四百七十三萬八千三百八十一京三千三百八十三萬二千一百六十一兆六千八百九十六萬億世之元四千三百二十震之兊五千六百八十六萬五百七十六京五百九十八萬五千九百四十兆二千七百五十二萬億世之會五萬一千八百四十震之離一十七垓五百八十一萬七千二百八十一京七千九百五十七萬八千二百八兆二千五百六十萬億世之運一百五十五萬五千二百震之震二百四垓六千九百八十萬七千三百八十一京五千四百九十三萬八千四百九十九兆七百二十萬億世之世一千八百六十六萬二千四百震之巽六千一百四十垓九千四百二十二萬一千四百四十六京四千八百一十五萬四千九百七十二兆一千六百萬億世之嵗五億五千九百八十七萬二千震之坎七萬三千六百九十一垓三千六十五萬七千三百五十七京七千七百八十五萬九千六百六十五兆九千二百萬億世之月六十七億一千八百四十六萬四千震之艮二百二十一萬七百三十一垓一千九百七十二萬七百三十三京三千五百七十八萬九千九百七十七兆六千萬億世之日二千一十五億五千三百九十二萬震之坤二千六百五十二萬八千八百七十垓三千六百六十四萬八千八百京二千九百四十七萬九千七百三十一兆二千萬億世之辰二萬四千一百八十六億四千七百四萬巽之乾七秭九千五百八十六萬六千一百一十垓九千九百四十六萬四千八京八千四百三十九萬一千九百三十六兆嵗之元十二萬九千六百巽之兊九十五秭五千三十九萬三千三百三十一垓九千三百五十六萬八千一百六京一千二百七十萬三千二百三十二兆嵗之會一百五十五萬五千二百巽之離二千八百六十五秭一千一百七十九萬九千九百五十八垓七百四萬三千一百八十三京八千一百九萬六千九百六十兆嵗之運四千六百六十五萬六千巽之震三萬四千三百八十一秭四千一百五十九萬九千四百九十六垓八千四百五十一萬八千二百五京七千三百一十六萬三千五百二十兆嵗之世五億五千九百八十七萬二千巽之巽一百三萬一千四百四十二秭四千七百九十八萬四千九百五垓三千五百五十四萬六千一百七十一京九千四百九十萬五千六百兆嵗之嵗一百六十七億九千六百一十六萬巽之坎一千二百三十七萬七千三百九秭七千五百八十一萬八千八百六十四垓二千六百五十五萬四千六十京三千八百八十六萬七千二百兆嵗之月二千一十五億五千三百九十二萬巽之艮三壤七千一百三十一萬九千二百九十二秭七千四百五十六萬五千九百二十七垓九千六百六十二萬一千九百一京六千六百一萬六千兆嵗之日六萬四百六十六億一千七百六十萬巽之坤四十四壤五千五百八十三萬一千五百一十二秭九千四百七十九萬一千一百三十五垓五千九百四十六萬二千八百一十九京九千二百一十九萬二千兆嵗之辰七十二萬五千五百九十四億一千一百二十萬坎之乾一千三百三十六壤七千四百九十四萬五千三百八十八秭四千三百七十三萬四千六十七垓八千三百八十八萬四千五百九十七京六千五百七十六萬兆月之元一百五十五萬五