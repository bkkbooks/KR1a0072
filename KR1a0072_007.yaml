body:
  text: 易纂言外翼卷七元呉澄撰變例第十案變例標目原本脫去小序云以動者尚其變謂蓍之變也述變例第十則此篇蓍法係變例篇無疑謹校補筮儀天子之蓍長九尺諸侯七尺大夫五尺士三尺大夫以上其蓍長皆是立筮今凖儀禮大夫立筮儀行之而士之坐筮者可推而用也蓍在韥饌于廟門外西塾之墉下南順所卦者在蓍西主人盛服門内之東西面立有司東面立筮人於外西塾之墉下取蓍韥以左手執之以右手抽上韥并扵左手兼下韥執之進門東東面受命于主人主人命筮人竟筮人退適門外之西西面立一人在筮人前之右東南面立一人在筮人前之左東北面立卦者一人西面坐于筮人之南少西筮人以右手取左手所執上韥執之并取左手所執下韥以右手兼執之以左手取下韥中之五十蓍執之而以右手所執之下韥撃左手所執之蓍執之述命曰假爾泰筮有常某以某事昭告尚其鑒之乃以右手所執之韥授右人又以右手取左手五十蓍之一蓍并授之右人受之納一蓍于下韥中奉韥置於外西塾復位立如初變之一筮人以左手所執四十九蓍兩手合執之乃以右拇指間開分蓍為二右手之蓍以授右人左手之蓍以授左人乃以右手于右人手中取一蓍掛于左手小指無名指之閒乃以右手取右人手中之蓍執之于左手而以右手四揲之所揲過之蓍每四以授右人四以下為餘所餘或四或三或二或一扐于左手無名指将指之間又以右手取左人手中之蓍執之于左手而以右手四揲之所揲過之蓍每四亦以授右人四以下為餘所餘或四或三或二或一扐於左手將指食指之間乃以右手并取左手二扐一掛之蓍或五或九以授左人左人受之以畀卦者是為一變四營而成易者此也卦者受第一變掛扐之蓍從委之于地第一變兩手所揲之餘右餘一左必餘三右餘二左亦餘二右餘三左必餘一二扐幷一掛之蓍得五者凡三除掛一有四者一是謂天一之竒右餘四左亦餘四二扐并一掛之蓍得九者凡一除掛一有四者二是為地二之偶變之二筮人於右人之手取揲過之蓍或四十四或四十兩手合執之分而為二一授右人一授左人於右人手中取一蓍掛于左手小指無名指之間乃取右人手中之蓍執之于左手而以右手四揲之以揲過之蓍授右人所餘或四或三或二或一扐于左手無名指将指之間乃取左人手中之蓍執之于左手而以右手四揲之以揲過之蓍授右人所餘或四或三或二或一扐于左手将指食指之間乃以右手并取左手二扐一掛之蓍或四或八以授左人左人受之以畀卦者是謂二變通一變凡八營卦者受第二變掛扐之蓍横委之于第一變掛扐之上北本第二變兩手所揲之餘右餘一左必餘二右餘二左必餘一二扐并一掛之蓍得四者凡二不除掛一有四者一是為天一之竒右餘三右必餘四右餘四左必餘三二扐并一掛之蓍得八者凡二不除掛一有四者二是為地二之偶變之三筮人于右人手取揲過之蓍或四十或三十六或三十二兩手合執之分而為二一授右人一授左人於右人手中取一蓍掛于左手小指無名指之閒乃取右人手中之蓍執之于左手而以右手四揲之以揲過之蓍授右人所餘或四或三或二或一扐于左手無名指将指之間乃取左人手中之蓍執之于左手而以右手四揲之以揲之蓍授右人所餘或四或三或二或一扐于左手将指食指之間乃以右手并取左手二扐一掛之蓍或四或八以授左人左人受之以畀卦者是謂三變通第一變凡十二營卦者受第三變掛扐之蓍又從委之于第二變掛扐之上少南第三變兩手所揲之餘右餘左餘並同第二變二扐并一掛之蓍得四者凡二不除掛一有四者一是為天一之竒二扐并一掛之蓍得八者凡二不除掛一有四者二是為地二之偶一變二變三變凡三掛六扐得天一竒數者以三數倚之謂之參天得地二偶數者以二數倚之謂之兩地一變得五二變得四三變得四是為三竒參天者三為九畫竒畫曰老陽一變得五二變得八三變得八或一變得九二變得四三變得八或一變得九二變得八三變得八是謂一竒一偶參天者一兩地者二共為七畫竒畫曰少陽一變得九二變得八三變得八是謂三偶兩地者三為六畫偶畫曰老陰一變得九二變得四三變得四或一變得五二變得八三變得四或一變得五二變得四三變得八是謂一偶一竒兩地者一參天者二共為八畫偶畫曰少陰卦者畫初畫畫畢乃以左手取所委三變掛扐之蓍以右手執之以授左人左人以右手受之變之四左人以所受掛扐之蓍或十三或十七或二十一或二十五以授筮人右人以所受揲過之蓍或二十四或二十八或三十二或三十六以授筮人筮人受左人右人之蓍共四十九兩手合執之分二掛一揲右一扐揲左再扐以其掛扐之蓍授左人左人以畀卦者並如第一變通前三變凡十六營變之五筮人取右人手揲過蓍合執之分二掛一揲右一扐揲左再扐以其掛扐之蓍授左人左人以畀卦者並如第二變通前四變凡二十營變之六筮人取右手揲過之蓍合執之分二掛一揲右一扐揲左再扐以其掛扐之蓍授左人左人以畀卦者並如第三變通前五變凡二十四營卦者畫二畫畢取所受掛扐之蓍以授左人又如前變之七左人以所受掛扐之蓍右人以所受揲過之蓍授筮人筮人分掛揲扐又如第一第四變通前六變凡二十八營變之八筮人取右手揲過之蓍分掛揲扐又如第二第五變通前七變凡三十二營變之九筮人取右手揲過之蓍分掛揲扐又如第三第六變通前八變凡三十六營卦者畫三畫得八卦中之一卦為六畫之下卦八卦而小成者此也畫三畫畢取所受掛扐之蓍以授左人又如前變之十左人以所受掛扐之蓍右人以所受揲過之蓍授筮人筮人分掛揲扐又如第一第四第七變通前九變凡四十營變之十一筮人取右人手揲過之蓍分掛揲扐又如第二第五第八變通前十變凡四十四營變之十二筮人取右人手揲過之蓍分掛揲扐又如第三第六第九變通前十一變凡四十八營卦者畫四畫畫畢取所受掛扐之蓍以授左人又如前變之十三左人以所受掛扐之蓍右人以所受揲過之蓍授筮人筮人分掛揲扐又如第一第四第七第十變通前十二變凡五十二營變之十四筮人取右人手揲過之蓍分掛揲扐又如第二第五第八第十一變通前十三變凡五十六營變之十五筮人取右人手揲過之蓍分掛揲扐又如第三第六第九第十二變通前十四變凡六十營卦者畫五畫畫畢取所受掛扐之蓍以授左人又如前變之十六左人以所受掛扐之蓍右人以所受揲過之蓍授筮人筮人分掛揲扐又如第一第四第七第十第十三變通前十五變凡六十四營變之十七筮人取右人手揲過之蓍分掛揲扐又如第二第五第八第十一第十四變通前十六變凡六十八營變之十八筮人取右人手揲過之蓍分掛揲扐又如第三第六第九第十二第十五變通前十七變凡七十二營卦者畫上畫又得八卦中之一畫為六畫卦之上卦十有八變而成卦者此也卦者取所委掛扐之蓍授左人畫卦於版以授筮人先復有司位筮人以卦進門東東面示主人還就有司位東面旅占右人以其所受揲過之蓍左人以其所受掛扐之蓍于有司位授筮人筮人受之右人於西塾取上下韥授筮人筮人受之以所受右人左人之蓍納于韥中蓋之執以右手執卦于左手進以示主人曰從乃退蓍及所卦者各藏于故所禮畢易原第十一案易原標目原本脱去據小序以圗書為易原必係此篇謹校補河圖者羲皇畫卦之前河有龍馬出而馬背之旋毛有此數也其數後一六前二七左三八右四九中五十五竒五偶相配羲皇平日觀於天地人物無非陽竒陰偶兩相對待見河圗之數而有契焉於是作一竒畫以象陽作一偶畫以象陰加而倍之以成八卦又加而倍之以成六十四卦所謂伏羲因河圗而畫八卦者此也以背毛之旋文如圖星者之圓圈故名之曰圖易繋辭傳曰天一地二天三地四天五地六天七地八天九地十天數五地數五天數二十有五地數三十凡天地之數五十有五此夫子以河圖之數而言也周書顧命曰天球河圗在東序河圖天所降之嘉瑞故傳寫其圖入於天府與國之寳器同藏貴重之也禮記禮運篇曰天不愛道故河出馬圗此記蓋孔門七十子之徒所作亦以河圖為盛世文明之祥論語曰河不出圖吾已矣夫夫子傷不遇時而歎道之不行也洛書者大禹治水之時洛有神龜出而龜甲之拆文有此數也其數後一前九左三右七右前二左前四右後六左後八中五四方四隅中央其位有九禹平日黙計天道人事之大要其類有九見洛書之數而有契焉於是以天道人事分為九類品其緩急先後之次以配龜甲一二三四五六七八九之文是為洪範九疇所謂大禹因洛書而叙九疇者此也以背甲之拆文如書字者之横畫故名之曰書周書洪範曰天乃錫禹洪範九疇初一次二次三次四次五次六次七次八次九此箕子以洛書之數而言也荘子外篇曰天有六極五常帝王順之則治逆之則凶九洛之事治成徳備葢言禹因洛書叙九疇終于六極始於五行五常即五行也九洛者謂九疇因洛書之九數也治成徳備者謂九疇所該載於國家之治無不完成人身之徳無不具備也大戴禮記明堂篇曰二九四七五三六一八註云九室法龜文故取此數按戴記明堂篇秦以前之書也隋經籍志以為安南太守劉熈註註之人在鄭𤣥王肅郭象之後自秦亡漢興以来河洛圖書不傳于世人所罕見而註云法龜文其言葢有所傳受也漢許慎説文解字一二三亖㐅昔黄帝之史蒼頡制字文始於數一二三亖皆積其畫之數而為文至㐅則變其文然中央交處四隅盡處其數亦五也六七八九之字乃秦李斯小篆義莫可通今不復得見古文之為何如龜書之文一為一二為二為三為四㐅為五為六為七為八為九並如倉頡一二三亖之積畫五六文亦同邵子曰圓者星也歴紀之數其肇於此乎方者土也畫州井地之法其放於此乎葢圓者河圖之數方者洛書之文故羲文因之而造易禹箕叙之而作範也員者星也歴紀之數其肇於此乎何謂也曰天之星有五宫東宫蒼龍北宫𤣥武西宫白虎南宫朱鳥中宫紫㣲垣是也五者有中央四邉而無四角無四角故員歴紀之數皆以五起五者五行之一周也五日為一候二其五者十干之一周也十日為一旬三其五為一氣六其五為一月九其五為一節十二其五者干支相乗之一周也十八其五為一時七十二其五為一歳每嵗木火土金水各王七十二日是為五辰凡此歴紀之數皆起於天星五宫之五故曰其肇於此乎方者土也畫州井地之法其放於此乎何謂也曰地之土有九區正東正南正西正北西北東北東南西南及中區是也九者有中央四邉而又有四角有四角故方畫州井地之法皆分為九以中國方三千里分為九州此畫州之九也以農田九百畝之地溝之作井字分為九夫此井地之九也凡此所畫所井之法皆放效地域九區之九故曰其放於此乎圓者河圖之數方者洛書之文何謂也曰河圖洛書者天地所呈自然之瑞河圖之數亦是五位合於天星五宫之圖一六居北者𤣥武之星也二七居南者朱鳥之星也三八居東者蒼龍之星也四九居西者白虎之星也五十居中者紫微垣之星也洛書之文亦是九位合於地土九區之方前戴九者正南之土也後履一者正北之土也左身三者正東之土也右身七者正西之土也右肩二者西南之土也左肩四者東南之土也右足六者西北之土也左足八者東北之土也中脊五者中區之土也羲文因之而造易禹箕叙之而作範何謂也曰河圖之位五每位各有一竒一耦數雖十而位止五故羲皇則其竒偶之數畫竒偶之畫一其竒耦而為初畫倍而二之則為二畫又倍而四之則為三畫又倍而八之則為四畫又倍而十六之則為五畫又倍而三十二之則為六畫而卦成矣此則其一竒一偶之數者然也初三四上象東南西北二五象中央此則其中央四旁之位者然也東西南北各一而中有二者旁位之竒偶合中位之竒偶分象北極見南極不見而皆為中宫之星也洛書之位九每位或一竒或一偶數有九而位亦九故大禹則其一二三四五六七八九之位數而定五行五事八政五紀皇極三徳稽疑庶徴五福六極之次第也造易者羲而并言文作範者禹而并言箕文之易即羲之易箕之範即禹之範也星之五宫圓河圖似之土之九區方洛書似之漢書五行志劉歆曰伏羲氏繼天而王受河圖則而畫之八卦是也禹治洪水賜洛書法而陳之洪範是也河圗洛書者天降其祥人傳其象周之時河圖與天球寳玉同藏於王府其貴重之也至矣秦漢以来官府既不收貯學者亦不復見觀劉歆所云本孔安國蓋亦祖述相傳之辭爾非曽親見圗書之象者也後漢鄭𤣥註禮記則不識河圖之為何物及魏何晏集論語註晉人作尚書孔傳顧命洪範兩註雖皆用孔劉之說而頗失其意葢孔劉雖不見圗書而謂伏羲則河圖畫八卦禹法洛書陳洪範則圖書自圖書卦範自卦範猶知其為二而不誤認為一也若魏儒晉儒則其意直謂周易八卦即是河圖洪範九疇即是洛書矣唐孔頴逹易書禮記䟽宋邢昺論語䟽亦然且雜取偽書怪誕之説皆由不曾見圖書十數九數之象故也易繋辭傳河出圖洛出書韓康伯無註孔疏曰孔安國以為河圖八卦是也洛書九疇是也鄭康成據春秋緯云河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感河圖有九篇洛書有六篇書顧命河圖在東序註曰河圖八卦伏羲氏王天下龍馬出河遂則其文以畫八卦謂之河圗疏曰當孔之時為此説必有書也五行志劉歆亦如此説書洪範天乃錫禹洪範九疇註曰洛神龜負文而出列於背有數至于九禹遂因而第之以成九類疏曰劉歆以為伏羲則河圖而畫之八卦是也禹法洛書而陳之洪範是也先達共此説龜負洛書經無其事中候及諸緯説黄帝堯舜禹湯文武受圖書之事皆云龍負圖龜負書緯候之書偽起哀平漢末始有禮記河出馬圖註曰馬圖龍馬負圖而出也疏曰伏羲有天下龍馬負圖出於河法之畫八卦按中候握河記堯時受河圗龍銜赤文緑色論語河不出圖註曰孔云河圖八卦是也邢疏曰孔安國以為河圖即八卦鄭𤣥以為河圗洛書龜龍銜負而出中候説龍馬銜甲赤文緑色甲似龜背袤廣九尺上有列宿斗正之度帝王紀録興亡之數周後漢初儒流專門之學率是口耳授受故凡有文辭可記誦者有傳而無文辭不可記誦者無傳五經皆存而獨樂之一經亡三百五篇詩皆存而獨笙詩之六篇亡葢以無文辭非可記誦故也若先天古易止有卦畫河圖洛書止有圖象則儒者亦不傳是以漢魏晉唐宋初之儒不見圖書羲易圖書不傳於儒流而方技之家藉此篇窺造化乃秘而寳之然歴代方技之人不過泥小術數鮮或探大本原雖秘此寳特小用之逮唐亡宋興之際異人挺生有希夷先生陳摶圖南有豪傑之才兼孔老之學從方技家得此三寳當時有穆修种放逰其門故穆得其古易种得其圖書穆傳李之才再傳而至邵雝种傳李溉許堅范諤昌四傳而至劉牧邵得圖書葢亦穆所傳也其洞徹蘊奥蔑以加矣劉亦發揮圖書而識者未之可焉别論于後宋祥符間王欽若蠱惑真宗欲以人力偽作天書真宗頗入其言一旦忽問老儒杜鎬曰古所謂河出圗洛出書果何事邪鎬對曰聖人以神道設教爾澄按杜鎬一時謾對真宗因此遂從欽若所敎而成天書之偽葢君臣問對之言皆是不曾見河圗洛書而又不明其義直以為馬負一片之圗而出於河龜負一片之書而出扵洛又疑其未必有是事而以為人之所為也歐陽文集曰繋辭云河出圖洛出書聖人則之圖者八卦之文也神馬負之自河而出以授伏羲八卦非人所為天之所降也又云包犧氏始作八卦然則八卦者人之所為也河圖不與焉若河圖之説信然乎是天生神馬負八卦出於水中乃天地自然之文爾何假包羲氏作之也歐陽氏文人巨擘唯是不見河圖洛書而承用註疏之説以為八卦即河圖也故其立言之謬誤有如此者王臨川文集河圖洛書義曰圗必出於河而洛不謂之圖書必出於洛而河不謂之書圗以示天道書以示人道也葢通於天者河而圖者以象言也成象之謂天故使龍負之而其出必於河龍善變而尚變者天道也中於地者洛而書者以法言也效法之謂人故使龜負之而其出必於洛龜善占而尚占者人道也按此篇永樂大典別卷作陸佃陶山集注云誤載荆公集歐陽氏王氏二文人皆不見河圖洛書然歐陽氏直以河圗洛書為無不信圖書故并疑繋詞非孔子所作王氏雖以河圖洛書為有而未嘗見其圖象故以意臆度懸空立言又誤以龍馬之龍為真龍也關子明易曰河圖之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右關子明易者宋仁宗時阮逸之所作也种穆得河圖洛書於希夷之家阮逸同時人葢亦因二家之所傳而得見圖書之象故其言云然劉牧易象鈎隠圖曰河圖數四十五陳四象而不言五行洛書數五十五演五行而不述四象河圖洛書邵所傳原於穆劉所傳原於种皆得自希夷者也然邵以十為河圖九為洛書與夫子箕子所言合而劉則以九為河圖十為洛書按劉之資識雖凡下而為人亦質直非敢故易置圖書之名也葢其初所傳但得二圖不曾分别何者為圖何者為書是致混淆而不免差互非劉之罪也今觀鉤隠圖下卷其河圖四象篇於北圖一㸃一之下圖五㸃并一而成六於南圖二㸃二之上圖五㸃并二而成七於東圖三㸃三之左圖五㸃并三而成八於西圖四㸃四之右圖五㸃并四而成九則是又以後一六前二七左三八右四九者為河圖也其龍圖龜書論取孔氏神龜負文而出列於背有數從一至於九之言則是又以從一至九者為洛書也終是圖九數書十數之説有所不安故前後自相牴牾如此劉牧差互於初傳之時葢不足怪最是後來朱蔡辨析明白而陋儒猶或循襲愚儒猶或執泥以劉牧之誤者為是斯其倥侗顓蒙奚異塗塞耳目者哉又按臨川王氏志劉之墓稱其為饒州軍事推官時師郡守范文正為兖州觀察推官時從孫復石介學春秋而未嘗稱其易圖豈求誌墓時不以此圖聞於王乎抑王見其圖之不足取而不稱之乎今圖之卷端偽作歐陽修序劉君子人也决不自作偽或是其子若弟託人求序而所託之人譔此偽文欺之爾歐陽與阮逸同是一時之人然阮及見圗書而歐陽未及見竊意當時雖有一二人得所傳而所傳未廣也歐陽不信圖書豈肯為劉牧作序况其文卑猥的然可知其非歐陽之筆乎劉著鈎隠之名朱震子𤼵易傳亦依劉牧九數之圖十數之書列於易圖之首邵子之學直至乾道淳熈間朱子始推尊之然信從者寡亦未盛行於世也朱子曰天地間一氣分而二則為陰陽河圖之位一與六居北二與七居南三與八居東四與九居西五與十居中一陰一陽两其五行而已洛書之位一與九對二與八對三與七對四與六對縱横皆十五河圖以五生數統五成數而同處其方洛書以五竒數統四偶數而各居其所河圖以生數為主而六七八九十者因五得數以附于生數一二三四五之外中者主而外者客也洛書以竒數為主而二四六八者各因其類以附于竒數一三七九之側正者君而側者臣也河圖運行則北水生木東木生火南火生土中土生金西金生水左旋一周而水又生木也洛書運行則一六水克火二七火克金九四金克木三八木克土中五土克水右旋一周而水復克火也河圖洛書者天地自然之文包括造化之妙無窮盡朱子推衍之其説詳矣今擇取其要附著焉河圖之馬不異於凡馬洛書之龜不異於凡龜初非怪事至今馬背之毛其旋有如星㸃特其旋無此十數爾至今龜背之甲其坼有如字畫特其坼無此九數爾聖人者出亦不異於常人特其心之所知能盡其性身之所得能踐其形為法於天下可傳於後世此為異爾或曰馬毛之旋如星㸃之圓圈者曰圖龜甲之坼如字畫之縱横者曰書是矣然傳自希夷者圖書皆作圓圈何也曰三代以後圖書隠晦千有餘年幸而方技家藏之得不冺絶至宋復出亦天之不愛道也然方技家之所取用不過以其數之多寡而已故傳寫洛書與河圖通作圓圈取其省易也如後世以𨽻書代篆以擲錢代蓍之類亦取省易云爾但曰圖曰書立名既異二者自應不同若洛書是圓圈則亦圖也何以謂之書哉且龜甲之上豈應現出圓圈之形鄭樵漁仲通志序曰河出圖有自然之象洛出書有自然之理天地出此二物以示聖人使百代憲章必本於此而不可偏廢者也鄭氏雖非精於河圖洛書之學然其所撰通志有六書略有圗譜略葢謂河圖之如星㸃者為諸圖形象之祖洛書之如字畫者為六書文字之宗故曰自然之象自然之理象猶天象之象理猶地理之理也旁窺暗合有見於圖書二名之異故其言亦精當使龜書如舊作字畫而不作圓圈則圖自為圖書自為書二種不相紊亂又安有誤以書為圖誤以圖為書者哉右總論河圖洛書先天方圖案此圖原本不著篇名據小序云羲皇心契天地自然之易將畫八卦圖出於河為易之原先天方圎圖所謂自然之易也圓圖及圖説疑脫去惟存此圖謹附于此易纂言外翼卷七
